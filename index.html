<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Filtre BIM Georges - Pro</title>
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 15px; background: white; }
        .card { border: 2px solid #2c3e50; padding: 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h3 { margin-top: 0; color: #2c3e50; font-size: 16px; }
        #status { font-size: 12px; padding: 8px; background: #ecf0f1; border-radius: 4px; margin-bottom: 15px; color: #34495e; }
        
        /* La zone de Drag & Drop stylée */
        #drop-zone { border: 2px dashed #3498db; border-radius: 8px; padding: 25px 10px; text-align: center; background: #ebf5fb; color: #2980b9; cursor: pointer; transition: all 0.3s ease; margin-bottom: 15px; font-weight: bold; font-size: 13px; }
        #drop-zone.dragover { background: #3498db; color: white; border-color: #2980b9; transform: scale(1.02); }
        #file-input { display: none; }

        select { width: 100%; padding: 10px; border: 2px solid #3498db; border-radius: 4px; margin-bottom: 10px; font-size: 13px; }
        .row { display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #eee; font-size: 13px; }
        .count { color: #7f8c8d; font-weight: bold; margin-left: 5px; font-size: 11px; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Filtre Avancé par Données</h3>
        <div id="status">✅ Connecté. Prêt à lire les données.</div>
        
        <div id="drop-zone">
            📂 Glissez-déposez le fichier CSV ici<br>
            <span style="font-size: 10px; font-weight: normal;">(ou cliquez pour parcourir)</span>
        </div>
        <input type="file" id="file-input" accept=".csv" />
        
        <div id="ui-filter" style="display:none;">
            <p style="font-size:12px; margin-bottom:5px; font-weight: bold; color: #2c3e50;">Filtrer par :</p>
            <select id="prop-selector"></select>
            <div id="results" style="margin-top:10px;"></div>
        </div>
    </div>

    <script>
        let API = null;
        let tableData = [];
        let guidColumnName = "";

        async function init() {
            try {
                API = await TrimbleConnectWorkspace.connect(window.parent);
            } catch (e) { document.getElementById('status').innerText = "❌ Erreur de connexion au viewer."; }
        }

        // --- GESTION DU DRAG & DROP ---
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');

        // Ouvre l'explorateur si on clique sur la zone
        dropZone.addEventListener('click', () => fileInput.click());

        // Effets visuels quand on glisse un fichier dessus
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) processFile(e.dataTransfer.files[0]);
        });

        // Lecture si on passe par le clic classique
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) processFile(e.target.files[0]);
        });

        // --- TRAITEMENT DU FICHIER CSV ---
        function processFile(file) {
            if (!file.name.endsWith('.csv')) {
                document.getElementById('status').innerText = "⚠️ Veuillez utiliser un fichier .csv";
                return;
            }

            const status = document.getElementById('status');
            status.innerText = "⏳ Analyse en cours...";

            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    tableData = results.data;
                    const headers = results.meta.fields;
                    
                    guidColumnName = headers.find(h => h.toUpperCase().includes("GUID"));
                    
                    if (!guidColumnName) {
                        status.innerText = "❌ Erreur : Colonne 'GUID' manquante dans l'export.";
                        dropZone.style.display = "block";
                        return;
                    }

                    const menu = document.getElementById('prop-selector');
                    menu.innerHTML = '<option value="">-- Sélectionnez un paramètre --</option>';
                    headers.forEach(h => { if (h !== guidColumnName) menu.innerHTML += `<option value="${h}">${h}</option>`; });

                    document.getElementById('ui-filter').style.display = "block";
                    // On cache la zone de drop pour gagner de la place une fois chargé
                    dropZone.style.display = "none"; 
                    status.innerText = `✅ Données chargées (${tableData.length} objets).`;
                }
            });
        }

        // --- FILTRAGE 3D ---
        document.getElementById('prop-selector').onchange = (e) => {
            const selectedCol = e.target.value;
            const res = document.getElementById('results');
            res.innerHTML = "";
            if (!selectedCol) return;

            const groups = {};
            tableData.forEach(row => {
                let val = row[selectedCol] || "Non défini";
                if (!groups[val]) groups[val] = [];
                if (row[guidColumnName]) groups[val].push(row[guidColumnName]);
            });

            Object.keys(groups).sort().forEach(val => {
                const div = document.createElement('div');
                div.className = "row";
                div.innerHTML = `<input type="checkbox" checked> <span style="margin-left:8px">${val}</span> <span class="count">(${groups[val].length})</span>`;
                
                div.querySelector('input').onchange = async (ev) => {
                    if(API) await API.viewer.setOpacity(groups[val], ev.target.checked ? 1 : 0);
                };
                res.appendChild(div);
            });
        };

        init();
    </script>
</body>
</html>
