<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filtre BIM Express</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 15px; background-color: #ffffff; color: #333; margin: 0; }
        .container { border: 2px solid #0078d4; border-radius: 8px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #0078d4; font-size: 18px; margin-top: 0; }
        button { width: 100%; padding: 12px; background-color: #0078d4; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        button:hover { background-color: #005a9e; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        select { width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #ccc; margin-bottom: 15px; }
        .status { font-size: 12px; color: #666; text-align: center; margin-bottom: 10px; }
        .layer-item { display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #eee; font-size: 13px; }
        .layer-item:last-child { border-bottom: none; }
        .count { margin-left: auto; background: #eee; padding: 2px 6px; border-radius: 10px; font-size: 11px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Filtre de Propriétés</h2>
    <div id="status" class="status">Initialisation...</div>
    
    <button id="btn-scan" disabled>1. Scanner la sélection</button>
    
    <div id="ui-filter" style="display:none;">
        <label for="prop-selector" style="font-size: 12px;">2. Filtrer par :</label>
        <select id="prop-selector"></select>
        <div id="results"></div>
    </div>
</div>

<script>
    // Version simplifiée et intégrée de l'API Trimble
    var TrimbleConnectWorkspace = (function() {
        return {
            connect: function() {
                return new Promise(function(resolve) {
                    var onMessage = function(event) {
                        if (event.data && event.data.method === "connected") {
                            window.removeEventListener("message", onMessage);
                            var requestId = 0;
                            var callbacks = {};
                            window.addEventListener("message", function(e) {
                                if (e.data && e.data.callbackId) {
                                    var cb = callbacks[e.data.callbackId];
                                    if (cb) { delete callbacks[e.data.callbackId]; cb(e.data.data); }
                                }
                            });
                            var request = function(method, params) {
                                var id = ++requestId;
                                return new Promise(function(res) {
                                    callbacks[id] = res;
                                    window.parent.postMessage({method: method, params: params, callbackId: id}, "*");
                                });
                            };
                            resolve({
                                ui: { getSelection: function() { return request("ui.getSelection"); } },
                                project: { getProperties: function(ids) { return request("project.getProperties", {objectIds: ids}); } },
                                visual: { setObjectVisibility: function(ids, v) { return request("visual.setObjectVisibility", {objectIds: ids, visible: v}); } }
                            });
                        }
                    };
                    window.addEventListener("message", onMessage);
                    window.parent.postMessage({method: "connect"}, "*");
                });
            }
        };
    })();

    let api, selectionData = [];

    async function start() {
        try {
            api = await TrimbleConnectWorkspace.connect();
            document.getElementById('status').innerText = "✅ Connecté à Trimble Connect";
            document.getElementById('btn-scan').disabled = false;
        } catch (e) {
            document.getElementById('status').innerText = "❌ Erreur de connexion au viewer";
        }
    }

    document.getElementById('btn-scan').onclick = async () => {
        const status = document.getElementById('status');
        status.innerText = "Analyse des objets...";
        const ids = await api.ui.getSelection();
        
        if (!ids || ids.length === 0) {
            status.innerText = "⚠️ Sélectionnez des objets dans la vue 3D !";
            return;
        }

        selectionData = await api.project.getProperties(ids);
        const props = new Set();
        selectionData.forEach(o => {
            if(o.properties) Object.keys(o.properties).forEach(p => props.add(p));
            if(o.propertySets) o.propertySets.forEach(ps => { if(ps.properties) Object.keys(ps.properties).forEach(p => props.add(p)); });
        });

        const selector = document.getElementById('prop-selector');
        selector.innerHTML = '<option value="">-- Choisir --</option>';
        Array.from(props).sort().forEach(p => selector.innerHTML += `<option value="${p}">${p}</option>`);
        
        document.getElementById('ui-filter').style.display = 'block';
        status.innerText = ids.length + " objets analysés.";
    };

    document.getElementById('prop-selector').onchange = (e) => {
        const p = e.target.value;
        const res = document.getElementById('results');
        res.innerHTML = "";
        if(!p) return;

        const groups = {};
        selectionData.forEach(o => {
            let val = "Non défini";
            if(o.properties && o.properties[p]) val = o.properties[p];
            else if(o.propertySets) o.propertySets.forEach(ps => { if(ps.properties && ps.properties[p]) val = ps.properties[p]; });
            if(!groups[val]) groups[val] = [];
            groups[val].push(o.id);
        });

        Object.keys(groups).sort().forEach(v => {
            const item = document.createElement('div');
            item.className = 'layer-item';
            item.innerHTML = `<input type="checkbox" checked> <span>${v}</span> <span class="count">${groups[v].length}</span>`;
            item.querySelector('input').onchange = (ev) => api.visual.setObjectVisibility(groups[v], ev.target.checked);
            res.appendChild(item);
        });
    };

    start();
</script>
</body>
</html>
