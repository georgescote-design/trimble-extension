<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Filtre BIM - Trimble API</title>
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background: white; }
        .card { border: 2px solid #0078d4; padding: 15px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        button { width: 100%; padding: 12px; background: #0078d4; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        #status { font-size: 13px; color: #0078d4; margin-bottom: 10px; text-align: center; }
        select { width: 100%; padding: 8px; margin-bottom: 10px; }
        .row { display: flex; align-items: center; padding: 5px; border-bottom: 1px solid #eee; font-size: 13px; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Filtre Intelligent</h3>
        <div id="status">🔄 Connexion au Parent...</div>
        
        <div id="ui" style="display:none;">
            <button id="btn-scan">SCANNER LA SÉLECTION</button>
            <select id="prop-selector"></select>
            <div id="results"></div>
        </div>
    </div>

<script>
    let API, selectionData = [];

    async function init() {
        const status = document.getElementById('status');
        try {
            // Utilisation exacte de la syntaxe du helpfile
            // On se connecte au "window.parent"
            API = await TrimbleConnectWorkspace.connect(window.parent, (event, data) => {
                console.log("Événement Trimble:", event, data);
            });

            status.innerText = "✅ Connecté à Trimble";
            document.getElementById('ui').style.display = "block";
        } catch (e) {
            status.innerText = "❌ Échec de connexion au Parent";
            console.error(e);
        }
    }

    document.getElementById('btn-scan').onclick = async () => {
        const ids = await API.ui.getSelection();
        if (!ids || ids.length === 0) return alert("Sélectionnez des objets !");
        
        // On récupère les propriétés (ProjectAPI)
        selectionData = await API.project.getProperties(ids);
        
        const props = new Set();
        selectionData.forEach(o => {
            if(o.properties) Object.keys(o.properties).forEach(p => props.add(p));
            if(o.propertySets) o.propertySets.forEach(ps => {
                if(ps.properties) Object.keys(ps.properties).forEach(p => props.add(p));
            });
        });

        const sel = document.getElementById('prop-selector');
        sel.innerHTML = '<option value="">-- Choisir un paramètre --</option>';
        Array.from(props).sort().forEach(p => sel.innerHTML += `<option value="${p}">${p}</option>`);
    };

    document.getElementById('prop-selector').onchange = (e) => {
        const p = e.target.value;
        const res = document.getElementById('results');
        res.innerHTML = "";
        const groups = {};

        selectionData.forEach(o => {
            let v = "N/A";
            if(o.properties && o.properties[p]) v = o.properties[p];
            else if(o.propertySets) o.propertySets.forEach(ps => { if(ps.properties && ps.properties[p]) v = ps.properties[p]; });
            if(!groups[v]) groups[v] = [];
            groups[v].push(o.id);
        });

        Object.keys(groups).sort().forEach(v => {
            const div = document.createElement('div');
            div.className = "row";
            div.innerHTML = `<input type="checkbox" checked> <span>${v} (${groups[v].length})</span>`;
            div.querySelector('input').onchange = (ev) => API.visual.setObjectVisibility(groups[v], ev.target.checked);
            res.appendChild(div);
        });
    };

    init();
</script>
</body>
</html>
