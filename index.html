À l'avenir, réponds-moi toujours avec des explications techniques détaillées<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Filtre BIM Georges - Pro</title>
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 15px; background: white; }
        .card { border: 2px solid #2c3e50; padding: 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h3 { margin-top: 0; color: #2c3e50; font-size: 16px; }
        #status { font-size: 12px; padding: 8px; background: #ecf0f1; border-radius: 4px; margin-bottom: 15px; color: #34495e; }
        .upload-label { display: block; border: 2px dashed #3498db; border-radius: 8px; padding: 25px 10px; text-align: center; background: #ebf5fb; color: #2980b9; cursor: pointer; transition: all 0.3s ease; margin-bottom: 15px; font-weight: bold; font-size: 13px; }
        .upload-label:hover { background: #3498db; color: white; border-color: #2980b9; transform: scale(1.02); }
        #file-input { display: none; }
        select { width: 100%; padding: 10px; border: 2px solid #3498db; border-radius: 4px; margin-bottom: 10px; font-size: 13px; }
        .row { display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #eee; font-size: 13px; }
        .count { color: #7f8c8d; font-weight: bold; margin-left: 5px; font-size: 11px; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Filtre Avancé par Données</h3>
        <div id="status">✅ Connecté. Prêt à lire les données.</div>
        
        <label for="file-input" class="upload-label" id="upload-zone">
            📂 CLIQUEZ ICI POUR IMPORTER LE CSV
        </label>
        <input type="file" id="file-input" accept=".csv" />
        
        <div id="ui-filter" style="display:none;">
            <p style="font-size:12px; margin-bottom:5px; font-weight: bold; color: #2c3e50;">Filtrer par :</p>
            <select id="prop-selector"></select>
            <div id="results" style="margin-top:10px;"></div>
        </div>
    </div>

    <script>
        let API = null;
        let tableData = [];
        let guidColumnName = "";

        // 1. Initialisation de la connexion
        async function init() {
            try {
                API = await TrimbleConnectWorkspace.connect(window.parent);
            } catch (e) { 
                document.getElementById('status').innerText = "❌ Erreur de connexion au viewer."; 
            }
        }

        // 2. Traitement du fichier CSV
        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const status = document.getElementById('status');
            const uploadZone = document.getElementById('upload-zone');
            status.innerText = "⏳ Analyse en cours...";

            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    tableData = results.data;
                    const headers = results.meta.fields;
                    
                    // Trouver la colonne GUID
                    guidColumnName = headers.find(h => h.toUpperCase().includes("GUID"));
                    
                    if (!guidColumnName) {
                        status.innerText = "❌ Erreur : Colonne 'GUID' manquante dans l'export.";
                        return;
                    }

                    // Remplir le menu déroulant
                    const menu = document.getElementById('prop-selector');
                    menu.innerHTML = '<option value="">-- Sélectionnez un paramètre --</option>';
                    headers.forEach(h => { 
                        if (h !== guidColumnName) {
                            menu.innerHTML += `<option value="${h}">${h}</option>`; 
                        }
                    });

                    document.getElementById('ui-filter').style.display = "block";
                    uploadZone.style.display = "none";
                    status.innerText = `✅ Données chargées (${tableData.length} objets).`;
                }
            });
        });

        // 3. Action quand on choisit un paramètre
        document.getElementById('prop-selector').onchange = async (e) => {
            const selectedCol = e.target.value;
            const res = document.getElementById('results');
            res.innerHTML = "⏳ Préparation du filtre...";
            if (!selectedCol) { res.innerHTML = ""; return; }

            const groups = {};
            tableData.forEach(row => {
                let val = row[selectedCol] || "Non défini";
                if (!groups[val]) groups[val] = [];
                if (row[guidColumnName]) groups[val].push(row[guidColumnName]);
            });

            res.innerHTML = ""; // On efface le message d'attente

            // Création des cases à cocher
            Object.keys(groups).sort().forEach(val => {
                const div = document.createElement('div');
                div.className = "row";
                div.innerHTML = `<input type="checkbox" checked> <span style="margin-left:8px">${val}</span> <span class="count">(${groups[val].length})</span>`;
                
                div.querySelector('input').onchange = async (ev) => {
                    if(!API) return;
                    try {
                        const isChecked = ev.target.checked;
                        const guidsBruts = groups[val];

                        // --- LE FIX ANTI-CRASH AVEC ÉTIQUETAGE DU MODÈLE ---
                        const models = await API.viewer.getModels();
                        let objectsToModify = [];

                        // On teste les GUIDs dans chaque modèle, un par un
                        for (const model of models) {
                            const mId = model.id || model.modelId;
                            if (!mId) continue;
                            
                            try {
                                const rIds = await API.viewer.convertToObjectRuntimeIds(mId, guidsBruts);
                                if (rIds && rIds.length > 0) {
                                    // LA MAGIE EST LÀ : On recolle l'étiquette du modèle sur chaque numéro
                                    const formattedObjects = rIds.map(rId => {
                                        return { modelId: mId, runtimeId: rId };
                                    });
                                    objectsToModify = objectsToModify.concat(formattedObjects);
                                }
                            } catch (err) {
                                // Si le modèle ne connaît pas l'objet, on l'ignore silencieusement
                            }
                        }

                        // Une fois qu'on a les objets avec leurs étiquettes parfaites, on masque
                        if (objectsToModify.length > 0) {
                            await API.viewer.setOpacity(objectsToModify, isChecked ? 1 : 0);
                        } else {
                            console.warn("Aucun objet trouvé à masquer dans les modèles actifs.");
                        }

                    } catch (error) {
                        console.error("Erreur lors du masquage :", error);
                    }
                };
                res.appendChild(div);
            });
        };

        init();
    </script>
</body>
</html>
