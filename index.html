<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Filtre BIM Georges</title>
    <style>
        body { font-family: sans-serif; padding: 15px; background: white; }
        .card { border: 2px solid #0078d4; padding: 15px; border-radius: 8px; }
        #btn-scan { 
            width: 100%; padding: 12px; background: #0078d4; color: white; 
            border: none; border-radius: 4px; cursor: pointer; font-weight: bold; 
        }
        #status { font-size: 13px; color: #0078d4; margin-bottom: 10px; text-align: center; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Filtre de Propriétés</h3>
        <div id="status">Chargement de l'API...</div>
        
        <div id="ui-area" class="hidden">
            <button id="btn-scan">SCANNER LA SÉLECTION</button>
            <select id="prop-selector" style="width:100%; margin-top:10px; padding:8px;"></select>
            <div id="results" style="margin-top:10px;"></div>
        </div>
    </div>

    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>

    <script>
        let API = null;
        let selectionData = [];

        async function init() {
            const status = document.getElementById('status');
            
            // Vérification si le script Trimble est bien chargé
            if (typeof TrimbleConnectWorkspace === 'undefined') {
                status.innerHTML = "❌ <span style='color:red'>Erreur: Script Trimble bloqué par le réseau.</span>";
                return;
            }

            try {
                API = await TrimbleConnectWorkspace.connect(window.parent);
                status.innerHTML = "✅ <span style='color:green'>SYSTÈME PRÊT</span>";
                document.getElementById('ui-area').classList.remove('hidden');
            } catch (e) {
                status.innerText = "⚠️ Connexion impossible à Trimble.";
            }
        }

        document.getElementById('btn-scan').onclick = async function() {
            const btn = this;
            btn.innerText = "⏳ ANALYSE...";
            btn.style.background = "#ff9800";

            try {
                const ids = await API.ui.getSelection();
                if (!ids || ids.length === 0) {
                    alert("Sélectionnez d'abord un objet dans la vue 3D !");
                    btn.innerText = "SCANNER LA SÉLECTION";
                    btn.style.background = "#0078d4";
                    return;
                }

                selectionData = await API.project.getProperties(ids);
                const props = new Set();
                selectionData.forEach(obj => {
                    if(obj.properties) Object.keys(obj.properties).forEach(p => props.add(p));
                    if(obj.propertySets) obj.propertySets.forEach(ps => {
                        if(ps.properties) Object.keys(ps.properties).forEach(p => props.add(p));
                    });
                });

                const sel = document.getElementById('prop-selector');
                sel.innerHTML = '<option value="">-- ' + props.size + ' Paramètres --</option>';
                Array.from(props).sort().forEach(p => {
                    sel.innerHTML += `<option value="${p}">${p}</option>`;
                });

                btn.innerText = "✅ SCAN TERMINÉ";
                btn.style.background = "#107c10";
            } catch (err) {
                btn.innerText = "❌ ERREUR";
                console.error(err);
            }
        };

        // Gestion du menu déroulant
        document.getElementById('prop-selector').onchange = (e) => {
            const p = e.target.value;
            const res = document.getElementById('results');
            res.innerHTML = "";
            const groups = {};
            selectionData.forEach(o => {
                let v = "N/A";
                if(o.properties && o.properties[p]) v = o.properties[p];
                else if(o.propertySets) o.propertySets.forEach(ps => { if(ps.properties && ps.properties[p]) v = ps.properties[p]; });
                if(!groups[v]) groups[v] = [];
                groups[v].push(o.id);
            });
            Object.keys(groups).sort().forEach(v => {
                const div = document.createElement('div');
                div.innerHTML = `<label><input type="checkbox" checked> ${v} (${groups[v].length})</label>`;
                div.querySelector('input').onchange = (ev) => API.visual.setObjectVisibility(groups[v], ev.target.checked);
                res.appendChild(div);
            });
        };

        window.onload = init;
    </script>
</body>
</html>
