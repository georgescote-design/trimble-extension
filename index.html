<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Filtre BIM Georges</title>
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background: white; }
        .card { border: 2px solid #0078d4; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h3 { color: #333; margin-top: 0; font-size: 18px; }
        #btn-scan { 
            width: 100%; padding: 12px; background: #0078d4; color: white; 
            border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px;
        }
        #status { font-size: 13px; color: #0078d4; margin-bottom: 10px; text-align: center; font-weight: bold; min-height: 20px;}
        select { width: 100%; margin-top: 10px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .row { display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #eee; font-size: 13px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Filtre de Propriétés</h3>
        <div id="status">Chargement...</div>
        
        <div id="ui-area" class="hidden">
            <button id="btn-scan">SCANNER LA SÉLECTION</button>
            <select id="prop-selector"></select>
            <div id="results" style="margin-top:10px;"></div>
        </div>
    </div>

    <script>
        let API = null;
        let selectionData = [];

        async function init() {
            const status = document.getElementById('status');
            try {
                API = await TrimbleConnectWorkspace.connect(window.parent);
                // Demande de permission
                if(API.extension && API.extension.requestPermission) {
                    await API.extension.requestPermission("accesstoken");
                }
                status.innerHTML = "✅ <span style='color:green'>SYSTÈME PRÊT</span>";
                document.getElementById('ui-area').classList.remove('hidden');
            } catch (e) {
                status.innerText = "⚠️ Erreur de connexion";
            }
        }

        document.getElementById('btn-scan').onclick = async function() {
            const btn = this;
            const status = document.getElementById('status');
            btn.innerText = "⏳ ANALYSE...";
            btn.style.background = "#ff9800";

            try {
                let ids = [];
                
                // TEST DES DIFFÉRENTES MÉTHODES DE SÉLECTION (Auto-détection)
                if (API.ui && typeof API.ui.getSelection === "function") {
                    ids = await API.ui.getSelection();
                } else if (API.selection && typeof API.selection.get === "function") {
                    ids = await API.selection.get();
                } else {
                    throw new Error("Méthode de sélection introuvable sur cette version d'API.");
                }

                if (!ids || ids.length === 0) {
                    status.innerText = "⚠️ Sélectionnez un objet d'abord !";
                    btn.innerText = "SCANNER LA SÉLECTION";
                    btn.style.background = "#0078d4";
                    return;
                }

                selectionData = await API.project.getProperties(ids);
                
                const props = new Set();
                selectionData.forEach(obj => {
                    if(obj.properties) Object.keys(obj.properties).forEach(p => props.add(p));
                    if(obj.propertySets) obj.propertySets.forEach(ps => {
                        if(ps.properties) Object.keys(ps.properties).forEach(p => props.add(p));
                    });
                });

                const sel = document.getElementById('prop-selector');
                sel.innerHTML = '<option value="">-- ' + props.size + ' Paramètres trouvés --</option>';
                Array.from(props).sort().forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p; opt.innerText = p;
                    sel.appendChild(opt);
                });

                btn.innerText = "✅ SCAN TERMINÉ";
                btn.style.background = "#107c10";
                status.innerText = "✅ " + ids.length + " objets analysés";
            } catch (err) {
                btn.innerText = "❌ ERREUR";
                btn.style.background = "#d13438";
                status.innerText = err.message;
                console.error("Détails de l'erreur:", err);
            }
        };

        document.getElementById('prop-selector').onchange = (e) => {
            const p = e.target.value;
            const res = document.getElementById('results');
            res.innerHTML = "";
            if(!p) return;

            const groups = {};
            selectionData.forEach(o => {
                let v = "Inconnu";
                if(o.properties && o.properties[p]) v = o.properties[p];
                else if(o.propertySets) {
                    o.propertySets.forEach(ps => { if(ps.properties && ps.properties[p]) v = ps.properties[p]; });
                }
                if(!groups[v]) groups[v] = [];
                groups[v].push(o.id);
            });

            Object.keys(groups).sort().forEach(v => {
                const div = document.createElement('div');
                div.className = "row";
                div.innerHTML = `<input type="checkbox" checked> <span style="margin-left:8px">${v} (${groups[v].length})</span>`;
                div.querySelector('input').onchange = (ev) => API.visual.setObjectVisibility(groups[v], ev.target.checked);
                res.appendChild(div);
            });
        };

        init();
    </script>
</body>
</html>
