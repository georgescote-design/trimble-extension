<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Diagnostic Automatique</title>
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; font-size: 13px; }
        .log-box { background: #222; color: #0f0; padding: 10px; border-radius: 5px; height: 250px; overflow-y: auto; font-family: monospace; }
        .status { margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="status" id="status">⏳ Connexion à Trimble...</div>
    <div class="log-box" id="console">En attente d'un clic sur un objet...</div>

    <script>
        let API;
        const consoleBox = document.getElementById('console');
        
        function log(msg) {
            consoleBox.innerHTML = `<div>> ${msg}</div>` + consoleBox.innerHTML;
        }

        async function init() {
            try {
                API = await TrimbleConnectWorkspace.connect(window.parent);
                document.getElementById('status').innerText = "✅ CONNECTÉ. Cliquez sur un objet en 3D !";
                
                // --- LA SOLUTION REBELLE ---
                // Au lieu d'attendre un clic sur un bouton, on écoute l'événement de sélection de Trimble
                API.viewer.on("selection-changed", async (data) => {
                    log("Sélection changée détectée !");
                    
                    if (!data || data.length === 0) {
                        log("⚠️ Sélection vide reçue.");
                        return;
                    }

                    log(`ID reçu : ${JSON.stringify(data[0])}`);
                    
                    try {
                        // On tente immédiatement de lire les propriétés de cet ID
                        const ids = data.map(i => typeof i === 'object' ? (i.id || i.runtimeId) : i);
                        const props = await API.viewer.getObjectProperties(ids);
                        
                        if (props && props.length > 0) {
                            log("✅ DONNÉES TROUVÉES !");
                            log("Groupes dispos : " + props[0].propertySets.map(ps => ps.name).join(', '));
                        } else {
                            log("❌ Objet identifié mais propriétés vides.");
                        }
                    } catch (err) {
                        log("❌ Erreur lecture : " + err.message);
                    }
                });

            } catch (e) {
                document.getElementById('status').innerText = "❌ Échec de connexion";
                log("Erreur : " + e.message);
            }
        }
        init();
    </script>
</body>
</html>
