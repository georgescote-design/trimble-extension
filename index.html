<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Diagnostic profond</title>
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
    <style>
        body { font-family: sans-serif; font-size: 12px; padding: 10px; }
        #console { background: #000; color: #0f0; padding: 10px; height: 300px; overflow: auto; border-radius: 5px; font-family: monospace; }
        button { width: 100%; padding: 10px; margin-top: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h3>Diagnostic des données</h3>
    <div id="status">⏳ Initialisation...</div>
    <div id="console">Appuyez sur SCAN pour inspecter un objet...</div>
    <button id="btn-scan" style="background: #0078d4; color: white; border:none;">SCANNER L'OBJET SÉLECTIONNÉ</button>

<script>
    let API;
    async function init() {
        try {
            API = await TrimbleConnectWorkspace.connect(window.parent);
            document.getElementById('status').innerText = "✅ Connecté. Sélectionnez 1 OBJET.";
        } catch (e) { document.getElementById('status').innerText = "❌ Erreur de connexion"; }
    }

    document.getElementById('btn-scan').onclick = async function() {
        const log = (msg) => { document.getElementById('console').innerHTML += "<br>> " + msg; };
        document.getElementById('console').innerHTML = "Lancement de l'inspection...";
        
        try {
            const ids = await API.viewer.getSelection();
            if (!ids || ids.length === 0) return log("ERREUR: Sélectionnez 1 objet en 3D !");
            
            log("ID détecté: " + ids[0]);

            // TEST 1: Propriétés classiques
            const props = await API.viewer.getObjectProperties([ids[0]]);
            log("--- STRUCTURE PROPRIÉTÉS ---");
            log(JSON.stringify(props[0], null, 2).substring(0, 500) + "...");

            // TEST 2: Recherche de la DataTable
            log("--- RECHERCHE DANS LES MODULES ---");
            const mods = Object.keys(API);
            log("Modules dispos: " + mods.join(', '));

            if (API.dataTable) {
                log("Tentative d'accès au module DataTable...");
                try {
                    // On essaie d'appeler toutes les méthodes possibles pour voir laquelle répond
                    const raw = await API.dataTable.getRows([ids[0]]);
                    log("Contenu DataTable: " + JSON.stringify(raw).substring(0, 200));
                } catch(e) { log("DataTable.getRows a échoué."); }
            }

        } catch (err) { log("ERREUR CRITIQUE: " + err.message); }
    };
    init();
</script>
</body>
</html>
