<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Filtre BIM Georges - Auto-Détection</title>
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background: white; }
        .card { border: 2px solid #0078d4; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { width: 100%; padding: 12px; background: #0078d4; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #status { font-size: 11px; color: #666; margin-bottom: 10px; background: #f0f0f0; padding: 5px; border-radius: 3px; min-height: 20px; }
        select { width: 100%; margin-top: 15px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .row { display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #eee; font-size: 12px; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Filtre Intelligent (Auto-Fix)</h3>
        <div id="status">✅ Système prêt</div>
        <button id="btn-scan">SCANNER LES DONNÉES</button>
        <div id="ui-filter" style="display:none;">
            <select id="prop-selector"></select>
            <div id="results"></div>
        </div>
    </div>

    <script>
        let API = null;
        let tableData = [];

        async function init() {
            try {
                API = await TrimbleConnectWorkspace.connect(window.parent);
                if(API.extension && API.extension.requestPermission) {
                    await API.extension.requestPermission("accesstoken");
                }
            } catch (e) { console.error(e); }
        }

        document.getElementById('btn-scan').onclick = async function() {
            const btn = this;
            const status = document.getElementById('status');
            btn.innerText = "⏳ RECHERCHE MÉTHODE...";
            btn.style.backgroundColor = "#ff9800";

            try {
                const ids = await API.viewer.getSelection();
                if (!ids || ids.length === 0) {
                    status.innerText = "⚠️ Sélectionnez des objets d'abord !";
                    btn.innerText = "SCANNER"; btn.style.backgroundColor = "#0078d4";
                    return;
                }

                let result = null;

                // --- STRATÉGIE DE DÉTECTION AUTOMATIQUE ---
                // Test 1: Organizer (Le plus probable pour 01_MANILA)
                if (API.organizer && API.organizer.getRows) {
                    result = await API.organizer.getRows(ids);
                } 
                // Test 2: DataTable avec nouveau nom
                else if (API.dataTable && API.dataTable.getRowsByObjectIds) {
                    result = await API.dataTable.getRowsByObjectIds(ids);
                }
                // Test 3: Project Properties (Retour à la base si le tableau est bloqué)
                else {
                    result = await API.viewer.getObjectProperties(ids);
                }

                tableData = result || [];
                const props = new Set();
                
                tableData.forEach(item => {
                    const data = item.properties || item.data || item;
                    Object.keys(data).forEach(k => {
                        if (typeof data[k] !== 'object') props.add(k);
                    });
                });

                if (props.size > 0) {
                    const sel = document.getElementById('prop-selector');
                    sel.innerHTML = '<option value="">-- ' + props.size + ' Paramètres --</option>';
                    Array.from(props).sort().forEach(p => sel.innerHTML += `<option value="${p}">${p}</option>`);
                    document.getElementById('ui-filter').style.display = "block";
                    btn.innerText = "✅ SCAN RÉUSSI";
                    btn.style.backgroundColor = "#107c10";
                    status.innerText = "✅ " + tableData.length + " objets lus.";
                } else {
                    btn.innerText = "⚠️ AUCUNE PROPRIÉTÉ";
                    status.innerText = "Les objets sont là, mais leurs colonnes sont invisibles pour l'API.";
                }

            } catch (err) {
                btn.innerText = "❌ ERREUR";
                status.innerText = "Erreur : " + err.message;
            }
        };

        document.getElementById('prop-selector').onchange = (e) => {
            const p = e.target.value;
            const res = document.getElementById('results');
            res.innerHTML = "";
            const groups = {};

            tableData.forEach(item => {
                const data = item.properties || item.data || item;
                let v = data[p] !== undefined ? data[p] : "Non défini";
                if(!groups[v]) groups[v] = [];
                groups[v].push(item.id || item.objectId);
            });

            Object.keys(groups).sort().forEach(v => {
                const div = document.createElement('div');
                div.className = "row";
                div.innerHTML = `<input type="checkbox" checked> <span style="margin-left:8px">${v} (${groups[v].length})</span>`;
                div.querySelector('input').onchange = (ev) => {
                    API.view.setObjectVisibility(groups[v], ev.target.checked);
                };
                res.appendChild(div);
            });
        };
        init();
    </script>
</body>
</html>
