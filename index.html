<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Filtre BIM Georges</title>
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background: white; }
        .card { border: 2px solid #0078d4; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h3 { margin-top: 0; color: #333; }
        #btn-scan { width: 100%; padding: 12px; background: #0078d4; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #status { font-size: 11px; color: #666; margin-bottom: 10px; background: #f0f0f0; padding: 5px; border-radius: 3px; min-height: 20px; }
        select { width: 100%; margin-top: 10px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .row { display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #eee; font-size: 13px; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Filtre de Propriétés</h3>
        <div id="status">✅ Système prêt</div>
        <button id="btn-scan">SCANNER LA SÉLECTION</button>
        <div id="ui-filter" style="display:none;">
            <select id="prop-selector" style="margin-top:15px;"></select>
            <div id="results"></div>
        </div>
    </div>

    <script>
        let API = null;
        let selectionData = [];

        async function init() {
            try {
                API = await TrimbleConnectWorkspace.connect(window.parent);
                if(API.extension && API.extension.requestPermission) {
                    await API.extension.requestPermission("accesstoken");
                }
            } catch (e) { console.error(e); }
        }

        document.getElementById('btn-scan').onclick = async function() {
            const btn = this;
            const status = document.getElementById('status');
            btn.innerText = "⏳ ANALYSE EN COURS...";
            btn.style.backgroundColor = "#ff9800";

            try {
                // 1. On récupère les IDs sélectionnés
                const ids = await API.viewer.getSelection();
                
                if (!ids || ids.length === 0) {
                    status.innerText = "⚠️ RIEN N'EST SÉLECTIONNÉ";
                    btn.innerText = "SCANNER LA SÉLECTION";
                    btn.style.backgroundColor = "#0078d4";
                    return;
                }

                status.innerText = "Récupération des données de " + ids.length + " objets...";

                // 2. TENTATIVE DE RÉCUPÉRATION (On teste Project d'abord, puis Viewer)
                try {
                    selectionData = await API.project.getProperties(ids);
                } catch(e) {
                    selectionData = await API.viewer.getObjectProperties(ids);
                }

                const props = new Set();
                selectionData.forEach(obj => {
                    // On scanne absolument tout ce qui ressemble à une clé de propriété
                    if(obj.properties) Object.keys(obj.properties).forEach(p => props.add(p));
                    if(obj.propertySets) {
                        obj.propertySets.forEach(ps => {
                            if(ps.properties) Object.keys(ps.properties).forEach(p => props.add(p));
                        });
                    }
                    // Certains fichiers Tekla/IFC mettent les infos ici :
                    if(obj.attributes) Object.keys(obj.attributes).forEach(p => props.add(p));
                });

                const sel = document.getElementById('prop-selector');
                if (props.size > 0) {
                    sel.innerHTML = '<option value="">-- ' + props.size + ' Paramètres trouvés --</option>';
                    Array.from(props).sort().forEach(p => {
                        sel.innerHTML += `<option value="${p}">${p}</option>`;
                    });
                    document.getElementById('ui-filter').style.display = "block";
                    btn.innerText = "✅ SCAN RÉUSSI";
                    btn.style.backgroundColor = "#107c10";
                    status.innerText = "✅ " + ids.length + " objets analysés.";
                } else {
                    btn.innerText = "⚠️ DONNÉES INVISIBLES";
                    status.innerText = "Les IDs sont reçus, mais les valeurs sont protégées ou vides.";
                    btn.style.backgroundColor = "#666";
                }
            } catch (err) {
                btn.innerText = "❌ ERREUR";
                btn.style.backgroundColor = "#d13438";
                status.innerText = "Détail : " + err.message;
            }
        };

        document.getElementById('prop-selector').onchange = (e) => {
            const p = e.target.value;
            const res = document.getElementById('results');
            res.innerHTML = "";
            const groups = {};

            selectionData.forEach(o => {
                let v = "Inconnu";
                // On cherche la valeur dans tous les tiroirs possibles
                if(o.properties && o.properties[p] !== undefined) v = o.properties[p];
                else if(o.attributes && o.attributes[p] !== undefined) v = o.attributes[p];
                else if(o.propertySets) {
                    o.propertySets.forEach(ps => { 
                        if(ps.properties && ps.properties[p] !== undefined) v = ps.properties[p]; 
                    });
                }
                if(!groups[v]) groups[v] = [];
                groups[v].push(o.id);
            });

            Object.keys(groups).sort().forEach(v => {
                const div = document.createElement('div');
                div.className = "row";
                div.innerHTML = `<input type="checkbox" checked> <span style="margin-left:8px">${v} (${groups[v].length})</span>`;
                div.querySelector('input').onchange = (ev) => {
                    API.view.setObjectVisibility(groups[v], ev.target.checked);
                };
                res.appendChild(div);
            });
        };
        init();
    </script>
</body>
</html>
