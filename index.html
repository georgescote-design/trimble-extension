<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Filtre BIM Georges - Explorateur</title>
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background: white; }
        .card { border: 2px solid #0078d4; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h3 { margin-top: 0; color: #333; font-size: 15px; }
        button { width: 100%; padding: 12px; background: #0078d4; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #status { font-size: 11px; color: #666; margin-bottom: 10px; background: #f0f0f0; padding: 5px; border-radius: 3px; min-height: 20px; }
        select { width: 100%; margin-top: 15px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .row { display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #eee; font-size: 12px; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Explorateur de Données BIM</h3>
        <div id="status">✅ Prêt pour l'exploration</div>
        <button id="btn-scan">SCANNER TOUTES LES DONNÉES</button>
        <div id="ui-filter" style="display:none;">
            <p style="font-size:11px; color:#0078d4;">Sélectionnez un paramètre pour filtrer :</p>
            <select id="prop-selector"></select>
            <div id="results" style="margin-top:10px;"></div>
        </div>
    </div>

    <script>
        let API = null;
        let selectionData = [];

        async function init() {
            try {
                API = await TrimbleConnectWorkspace.connect(window.parent);
            } catch (e) { console.error(e); }
        }

        document.getElementById('btn-scan').onclick = async function() {
            const btn = this;
            const status = document.getElementById('status');
            btn.innerText = "⏳ LECTURE TOTALE...";
            
            try {
                const rawSelection = await API.viewer.getSelection();
                const ids = rawSelection.map(item => (typeof item === 'object' ? (item.id || item.runtimeId) : item));

                if (!ids || ids.length === 0) {
                    status.innerText = "⚠️ Sélectionnez un objet en 3D d'abord !";
                    btn.innerText = "SCANNER TOUTES LES DONNÉES";
                    return;
                }

                // On récupère les propriétés par le Viewer ET le Projet pour être sûr
                let results = await API.viewer.getObjectProperties(ids);
                if (!results || results.length === 0) {
                    results = await API.project.getProperties(ids);
                }
                
                selectionData = results || [];
                const props = new Set();
                
                selectionData.forEach(obj => {
                    // 1. On prend tout ce qui est à la racine
                    if (obj.properties) Object.keys(obj.properties).forEach(k => props.add(k));
                    
                    // 2. On prend tout ce qui est dans TOUS les PropertySets (Manila ou autre)
                    if (obj.propertySets) {
                        obj.propertySets.forEach(ps => {
                            if (ps.properties) {
                                Object.keys(ps.properties).forEach(k => props.add(k));
                            }
                        });
                    }
                });

                const sel = document.getElementById('prop-selector');
                if (props.size > 0) {
                    sel.innerHTML = '<option value="">-- ' + props.size + ' Paramètres trouvés --</option>';
                    // On trie les noms de paramètres par ordre alphabétique
                    Array.from(props).sort().forEach(p => {
                        const opt = document.createElement('option');
                        opt.value = p; opt.innerText = p;
                        sel.appendChild(opt);
                    });
                    document.getElementById('ui-filter').style.display = "block";
                    btn.innerText = "✅ EXPLORATION RÉUSSIE";
                    btn.style.backgroundColor = "#107c10";
                    status.innerText = "✅ " + ids.length + " objets analysés.";
                } else {
                    btn.innerText = "⚠️ AUCUNE DONNÉE";
                    status.innerText = "L'objet n'a aucune donnée BIM visible par l'API.";
                }

            } catch (err) {
                status.innerText = "Erreur: " + err.message;
            }
        };

        document.getElementById('prop-selector').onchange = (e) => {
            const p = e.target.value;
            const res = document.getElementById('results');
            res.innerHTML = "";
            if (!p) return;

            const groups = {};
            selectionData.forEach(o => {
                let v = "Non défini";
                
                // Recherche de la valeur partout
                if (o.properties && o.properties[p] !== undefined) {
                    v = o.properties[p];
                } else if (o.propertySets) {
                    o.propertySets.forEach(ps => {
                        if (ps.properties && ps.properties[p] !== undefined) {
                            v = ps.properties[p];
                        }
                    });
                }
                
                if(!groups[v]) groups[v] = [];
                groups[v].push(o.id);
            });

            Object.keys(groups).sort().forEach(v => {
                const div = document.createElement('div');
                div.className = "row";
                div.innerHTML = `<input type="checkbox" checked> <span style="margin-left:8px">${v} (${groups[v].length})</span>`;
                div.querySelector('input').onchange = (ev) => {
                    API.viewer.setObjectVisibility(groups[v], ev.target.checked);
                };
                res.appendChild(div);
            });
        };

        init();
    </script>
</body>
</html>
