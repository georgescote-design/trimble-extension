<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Filtre BIM - G.Côté Canam</title>
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 12px; background: white; }
        .card { border: 2px solid #2c3e50; padding: 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header-container { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        h3 { margin: 0; font-size: 15px; color: #2c3e50; }
        .author-tag { font-size: 10px; color: #7f8c8d; }
        #status { font-size: 12px; padding: 8px; background: #e8f4fd; border-radius: 4px; margin-bottom: 12px; color: #2980b9; border-left: 4px solid #3498db; }
        .upload-label { display: block; border: 2px dashed #3498db; padding: 15px; text-align: center; cursor: pointer; margin-bottom: 12px; color: #3498db; font-weight: bold; border-radius: 8px; font-size: 13px; }
        #file-input { display: none; }
        select { width: 100%; padding: 8px; border: 2px solid #3498db; border-radius: 4px; margin-bottom: 10px; font-size: 12px; }
        .row { display: flex; align-items: center; padding: 5px 8px; border-bottom: 1px solid #eee; font-size: 11px; }
        .count { color: #7f8c8d; font-weight: bold; margin-left: auto; font-size: 10px; }
        input[type="color"] { border: none; width: 20px; height: 20px; cursor: pointer; margin: 0 8px; padding: 0; background: none; }
        #btn-reset { background: #e74c3c; color: white; border: none; padding: 10px; border-radius: 4px; font-size: 11px; cursor: pointer; font-weight: bold; display: none; width: 100%; margin-bottom: 8px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header-container">
            <div>
                <h3 id="ui-title">Filtre avancé par catégorie</h3>
                <span class="author-tag">(G.Côté Groupe Canam inc.)</span>
            </div>
            <button id="btn-lang" style="font-size:10px; padding:2px 6px; cursor:pointer;">🇬🇧 EN</button>
        </div>
        <div id="status">⏳ Initialisation...</div>
        <label for="file-input" class="upload-label" id="upload-zone">📂 IMPORTER LE CSV</label>
        <input type="file" id="file-input" accept=".csv" />
        
        <div id="ui-filter" style="display:none;">
            <select id="prop-selector"></select>
            <button id="btn-reset">🔄 RÉINITIALISER TOUT</button>
            <div id="results"></div>
        </div>
    </div>

    <script>
        let API = null;
        let tableData = [];
        let guidCol = "";
        let currentLang = 'fr';

        // Connexion sécurisée avec tentative répétée
        async function connectTrimble() {
            try { 
                API = await TrimbleConnectWorkspace.connect(window.parent); 
                document.getElementById('status').innerText = "✅ Prêt. Importez votre fichier.";
            } catch (e) { 
                console.log("Attente de Trimble...");
                setTimeout(connectTrimble, 2000); // Réessaie dans 2 secondes si ça échoue
            }
        }

        document.getElementById('file-input').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            Papa.parse(file, {
                header: true, skipEmptyLines: true,
                complete: (r) => {
                    tableData = r.data;
                    guidCol = r.meta.fields.find(h => h.toUpperCase().includes("GUID"));
                    if(!guidCol) {
                        document.getElementById('status').innerText = "❌ Colonne GUID manquante !";
                        return;
                    }
                    const menu = document.getElementById('prop-selector');
                    menu.innerHTML = `<option value="">-- Choisir un paramètre --</option>` + 
                                     r.meta.fields.filter(h => h !== guidCol).map(h => `<option value="${h}">${h}</option>`).join('');
                    document.getElementById('ui-filter').style.display = "block";
                    document.getElementById('upload-zone').style.display = "none";
                    document.getElementById('status').innerText = `✅ ${tableData.length} objets chargés.`;
                }
            });
        };

        async function updateVisibility(guids, isVisible, color = null) {
            if (!API) return;
            const models = await API.viewer.getModels();
            for (const m of models) {
                const rIds = await API.viewer.convertToObjectRuntimeIds(m.id || m.modelId, guids);
                if (rIds && rIds.length > 0) {
                    const params = { modelObjectIds: [{ modelId: m.id || m.modelId, objectRuntimeIds: rIds }] };
                    const state = { visible: isVisible };
                    if (color) state.color = color;
                    await API.viewer.setObjectState(params, state);
                }
            }
        }

        document.getElementById('prop-selector').onchange = (e) => {
            const col = e.target.value;
            const res = document.getElementById('results');
            if (!col) { res.innerHTML = ""; return; }
            document.getElementById('btn-reset').style.display = "block";
            
            const groups = {};
            tableData.forEach(row => {
                const val = row[col] || "N/A";
                if (!groups[val]) groups[val] = [];
                if (row[guidCol]) groups[val].push(row[guidCol]);
            });

            res.innerHTML = "";
            Object.keys(groups).sort().forEach(val => {
                const div = document.createElement('div');
                div.className = "row";
                div.innerHTML = `<input type="checkbox" class="vis-check" checked> <input type="color" class="color-picker" value="#95a5a6"> <span>${val}</span><span class="count">(${groups[val].length})</span>`;
                
                const cb = div.querySelector('.vis-check');
                const cp = div.querySelector('.color-picker');

                cb.onchange = () => updateVisibility(groups[val], cb.checked);
                cp.oninput = (ev) => {
                    const r = parseInt(ev.target.value.slice(1,3), 16), 
                          g = parseInt(ev.target.value.slice(3,5), 16), 
                          b = parseInt(ev.target.value.slice(5,7), 16);
                    updateVisibility(groups[val], true, { r, g, b, a: 255 });
                    cb.checked = true;
                };
                res.appendChild(div);
            });
        };

        document.getElementById('btn-reset').onclick = async () => {
            if(!API) return;
            await API.viewer.resetColors();
            const models = await API.viewer.getModels();
            for (const m of models) await API.viewer.setObjectState({ modelId: m.id || m.modelId, all: true }, { visible: true });
            document.querySelectorAll('.vis-check').forEach(c => c.checked = true);
        };

        connectTrimble();
    </script>
</body>
</html>
