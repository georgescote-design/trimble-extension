<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Filtre BIM Georges - Fix Final</title>
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; }
        .card { border: 2px solid #0078d4; padding: 15px; border-radius: 8px; }
        #status { font-size: 11px; padding: 8px; background: #f0f0f0; margin-bottom: 10px; border-radius: 4px; }
        select { width: 100%; padding: 8px; border: 1px solid #0078d4; border-radius: 4px; }
        .row { display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #eee; font-size: 12px; }
    </style>
</head>
<body>
    <div class="card">
        <div id="status">⏳ Connexion...</div>
        <div id="ui" style="display:none;">
            <p style="font-size:11px">Sélectionnez vos objets en 3D :</p>
            <select id="prop-selector"></select>
            <div id="results" style="margin-top:10px;"></div>
        </div>
    </div>

    <script>
        let API = null;
        let lastSelectionStr = "";
        let currentData = [];

        async function init() {
            try {
                API = await TrimbleConnectWorkspace.connect(window.parent);
                document.getElementById('status').innerText = "✅ Connecté. Sélectionnez 1 objet.";
                document.getElementById('ui').style.display = "block";
                startMonitoring();
            } catch (e) { document.getElementById('status').innerText = "❌ Erreur"; }
        }

        function startMonitoring() {
            setInterval(async () => {
                try {
                    const sel = await API.viewer.getSelection();
                    const selStr = JSON.stringify(sel);
                    if (sel && sel.length > 0 && selStr !== lastSelectionStr) {
                        lastSelectionStr = selStr;
                        // --- LA TRADUCTION ---
                        // On utilise convertToObjectIds que nous avons vu dans ta liste
                        const ids = await API.viewer.convertToObjectIds(sel);
                        analyze(ids);
                    }
                } catch (e) {}
            }, 1000);
        }

        async function analyze(ids) {
            const status = document.getElementById('status');
            status.innerText = "⏳ Analyse de " + ids.length + " objets...";
            try {
                // On demande les propriétés avec les vrais IDs
                currentData = await API.viewer.getObjectProperties(ids);
                const props = new Set();
                currentData.forEach(o => {
                    if (o.propertySets) o.propertySets.forEach(ps => {
                        if (ps.properties) Object.keys(ps.properties).forEach(k => props.add(k));
                    });
                    if (o.properties) Object.keys(o.properties).forEach(k => props.add(k));
                });

                const menu = document.getElementById('prop-selector');
                menu.innerHTML = '<option value="">-- ' + props.size + ' Paramètres trouvés --</option>';
                Array.from(props).sort().forEach(p => menu.innerHTML += `<option value="${p}">${p}</option>`);
                status.innerText = "✅ " + currentData.length + " objets prêts.";
            } catch (err) { status.innerText = "❌ Erreur : " + err.message; }
        }

        document.getElementById('prop-selector').onchange = (e) => {
            const p = e.target.value;
            const res = document.getElementById('results');
            res.innerHTML = "";
            const groups = {};
            
            currentData.forEach(o => {
                let val = "Inconnu";
                if (o.propertySets) o.propertySets.forEach(ps => {
                    if (ps.properties && ps.properties[p] !== undefined) val = ps.properties[p];
                });
                if (val === "Inconnu" && o.properties && o.properties[p] !== undefined) val = o.properties[p];
                if (!groups[val]) groups[val] = [];
                // On utilise runtimeId pour l'opacité
                groups[val].push(o.runtimeId || o.id);
            });

            Object.keys(groups).sort().forEach(v => {
                const div = document.createElement('div');
                div.className = "row";
                div.innerHTML = `<input type="checkbox" checked> <span style="margin-left:8px">${v} (${groups[v].length})</span>`;
                div.querySelector('input').onchange = async (ev) => {
                    // Visibilité par opacité (vu dans ta liste)
                    await API.viewer.setOpacity(groups[v], ev.target.checked ? 1 : 0);
                };
                res.appendChild(div);
            });
        };
        init();
    </script>
</body>
</html>
