<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Filtre BIM Georges</title>
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background: white; }
        .card { border: 2px solid #0078d4; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #btn-scan { width: 100%; padding: 12px; background: #0078d4; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #status { font-size: 11px; color: #666; margin-bottom: 10px; word-break: break-all; background: #f0f0f0; padding: 5px; }
        select { width: 100%; margin-top: 10px; padding: 8px; }
        .row { display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #eee; font-size: 13px; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Filtre de Propriétés</h3>
        <div id="status">Initialisation...</div>
        
        <button id="btn-scan">SCANNER LA SÉLECTION</button>
        
        <select id="prop-selector" style="display:none;"></select>
        <div id="results"></div>
    </div>

    <script>
        let API = null;
        let selectionData = [];

        async function init() {
            const status = document.getElementById('status');
            try {
                API = await TrimbleConnectWorkspace.connect(window.parent);
                
                // On liste les modules disponibles pour debugger
                const modules = Object.keys(API).join(', ');
                status.innerHTML = "✅ Connecté. Modules : " + modules;
                
                if(API.extension && API.extension.requestPermission) {
                    await API.extension.requestPermission("accesstoken");
                }
            } catch (e) {
                status.innerText = "⚠️ Erreur de connexion";
            }
        }

        document.getElementById('btn-scan').onclick = async function() {
            const btn = this;
            const status = document.getElementById('status');
            btn.innerText = "⏳ ANALYSE...";
            
            try {
                let ids = [];

                // TEST 1 : La méthode officielle du Helpfile
                if (API.ui && API.ui.getSelection) {
                    ids = await API.ui.getSelection();
                } 
                // TEST 2 : La méthode alternative
                else if (API.selection && API.selection.get) {
                    ids = await API.selection.get();
                }
                // TEST 3 : Pour les "Project Extensions"
                else if (API.viewer && API.viewer.getSelection) {
                    ids = await API.viewer.getSelection();
                }

                if (!ids || ids.length === 0) {
                    status.innerText = "⚠️ Sélectionnez un objet dans la vue 3D avant de cliquer.";
                    btn.innerText = "SCANNER LA SÉLECTION";
                    return;
                }

                selectionData = await API.project.getProperties(ids);
                const props = new Set();
                selectionData.forEach(obj => {
                    if(obj.properties) Object.keys(obj.properties).forEach(p => props.add(p));
                    if(obj.propertySets) obj.propertySets.forEach(ps => {
                        if(ps.properties) Object.keys(ps.properties).forEach(p => props.add(p));
                    });
                });

                const sel = document.getElementById('prop-selector');
                sel.style.display = "block";
                sel.innerHTML = '<option value="">-- ' + props.size + ' Paramètres trouvés --</option>';
                Array.from(props).sort().forEach(p => sel.innerHTML += `<option value="${p}">${p}</option>`);

                btn.innerText = "✅ SCAN TERMINÉ";
                btn.style.background = "#107c10";
            } catch (err) {
                btn.innerText = "❌ ERREUR";
                status.innerText = "Détail : " + err.message;
            }
        };

        document.getElementById('prop-selector').onchange = (e) => {
            const p = e.target.value;
            const res = document.getElementById('results');
            res.innerHTML = "";
            const groups = {};
            selectionData.forEach(o => {
                let v = "Inconnu";
                if(o.properties && o.properties[p]) v = o.properties[p];
                else if(o.propertySets) o.propertySets.forEach(ps => { if(ps.properties && ps.properties[p]) v = ps.properties[p]; });
                if(!groups[v]) groups[v] = [];
                groups[v].push(o.id);
            });
            Object.keys(groups).sort().forEach(v => {
                const div = document.createElement('div');
                div.className = "row";
                div.innerHTML = `<input type="checkbox" checked> <span style="margin-left:8px">${v} (${groups[v].length})</span>`;
                div.querySelector('input').onchange = (ev) => API.visual.setObjectVisibility(groups[v], ev.target.checked);
                res.appendChild(div);
            });
        };

        init();
    </script>
</body>
</html>
