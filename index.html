<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://connect-extensions.trimble.com/js/trimble.connect.workspace.api.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f4f4f4; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { width: 100%; padding: 12px; background: #0078d4; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        select { width: 100%; padding: 10px; margin-top: 10px; }
        .layer-item { display: flex; align-items: center; background: white; margin-top: 5px; padding: 8px; border-radius: 4px; border-left: 5px solid #0078d4; }
        .count { margin-left: auto; color: #888; font-size: 0.8em; }
    </style>
</head>
<body>

    <div class="card">
        <strong>1. Sélectionnez des objets dans la vue 3D</strong>
        <button id="btn-scan" disabled style="margin-top:10px;">Initialisation...</button>
        
        <div id="ui-choix" style="display:none; margin-top:15px; border-top: 1px solid #eee; pt:10px;">
            <strong>2. Paramètre trouvé :</strong>
            <select id="prop-selector"></select>
        </div>
    </div>

    <div id="status" style="font-size: 12px; margin: 10px 0; color: #666;">Connexion à Trimble...</div>
    <div id="layers-list"></div>

    <script>
        let api = null;
        let selectionProps = [];

        async function init() {
            try {
                // Tentative de connexion
                api = await TrimbleConnectWorkspace.connect();
                document.getElementById('btn-scan').disabled = false;
                document.getElementById('btn-scan').innerText = "Scanner la sélection";
                document.getElementById('status').innerText = "Prêt : Sélectionnez des objets et cliquez sur le bouton.";
            } catch (e) {
                document.getElementById('status').innerText = "Erreur de connexion : " + e.message;
            }
        }

        document.getElementById('btn-scan').onclick = async () => {
            if (!api) return; // Sécurité supplémentaire

            const status = document.getElementById('status');
            status.innerText = "Lecture de la sélection...";
            
            try {
                const selIds = await api.ui.getSelection();
                
                if (selIds.length === 0) {
                    status.innerText = "⚠️ Sélectionnez d'abord des objets dans la vue 3D !";
                    return;
                }

                selectionProps = await api.project.getProperties(selIds);
                const uniqueNames = new Set();

                selectionProps.forEach(obj => {
                    if (obj.properties) Object.keys(obj.properties).forEach(n => uniqueNames.add(n));
                    if (obj.propertySets) {
                        obj.propertySets.forEach(ps => {
                            if (ps.properties) Object.keys(ps.properties).forEach(n => uniqueNames.add(n));
                        });
                    }
                });

                const selector = document.getElementById('prop-selector');
                selector.innerHTML = '<option value="">-- Choisir un paramètre --</option>';
                Array.from(uniqueNames).sort().forEach(n => {
                    const opt = document.createElement('option');
                    opt.value = n; opt.innerText = n;
                    selector.appendChild(opt);
                });

                document.getElementById('ui-choix').style.display = "block";
                status.innerText = selIds.length + " objets analysés avec succès.";
            } catch (e) {
                status.innerText = "Erreur : " + e.message;
            }
        };

        document.getElementById('prop-selector').onchange = (e) => {
            const prop = e.target.value;
            const container = document.getElementById('layers-list');
            container.innerHTML = "";
            if (!prop) return;

            const groups = {};
            selectionProps.forEach(obj => {
                let val = "Non défini";
                if (obj.properties && obj.properties[prop]) val = obj.properties[prop];
                else if (obj.propertySets) {
                    obj.propertySets.forEach(ps => { if(ps.properties && ps.properties[prop]) val = ps.properties[prop]; });
                }
                if (!groups[val]) groups[val] = [];
                groups[val].push(obj.id);
            });

            Object.keys(groups).sort().forEach(v => {
                const item = document.createElement('div');
                item.className = 'layer-item';
                item.innerHTML = `<input type="checkbox" checked> <span style="margin-left:8px">${v}</span> <span class="count">${groups[v].length}</span>`;
                item.querySelector('input').onchange = (ev) => api.visual.setObjectVisibility(groups[v], ev.target.checked);
                container.appendChild(item);
            });
        };

        // Lancement de l'initialisation
        init();
    </script>
</body>
</html>
