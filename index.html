<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Filtre BIM Georges - Final</title>
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; }
        .card { border: 2px solid #0078d4; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #btn-scan { width: 100%; padding: 12px; background: #0078d4; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        #status { font-size: 11px; padding: 8px; background: #f0f0f0; border-radius: 4px; margin-bottom: 10px; min-height: 15px; color: #333; }
        select { width: 100%; padding: 10px; border: 2px solid #0078d4; border-radius: 4px; }
        .row { display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #eee; font-size: 12px; }
        .count { color: #0078d4; font-weight: bold; margin-left: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Filtre des Propriétés</h3>
        <div id="status">⏳ Initialisation...</div>
        <button id="btn-scan">1. ANALYSER LA SÉLECTION</button>
        
        <div id="ui-filter" style="display:none;">
            <p style="font-size:11px; margin-bottom:5px;">2. Choisir un paramètre :</p>
            <select id="prop-selector"></select>
            <div id="results" style="margin-top:10px;"></div>
        </div>
    </div>

    <script>
        let API = null;
        let currentData = [];

        async function init() {
            try {
                API = await TrimbleConnectWorkspace.connect(window.parent);
                document.getElementById('status').innerText = "✅ Système prêt.";
            } catch (e) { document.getElementById('status').innerText = "❌ Erreur de connexion."; }
        }

        document.getElementById('btn-scan').onclick = async function() {
            const status = document.getElementById('status');
            this.innerText = "⏳ LECTURE DES DONNÉES...";
            this.style.backgroundColor = "#ff9800";
            
            try {
                const rawSelection = await API.viewer.getSelection();
                if (!rawSelection || rawSelection.length === 0) {
                    status.innerText = "⚠️ Sélectionnez d'abord des objets en 3D !";
                    this.innerText = "1. ANALYSER LA SÉLECTION";
                    this.style.backgroundColor = "#0078d4";
                    return;
                }

                let ids = [];
                try {
                    ids = await API.viewer.convertToObjectIds(rawSelection);
                } catch(e) {
                    ids = rawSelection.map(item => typeof item === 'object' ? (item.id || item.runtimeId) : item);
                }

                status.innerText = "✅ " + ids.length + " objets détectés. Extraction des paramètres...";

                currentData = await API.viewer.getObjectProperties(ids);
                const props = new Set();
                
                // LE FIX EST ICI : On lit TOUS les vrais dossiers, on ne cherche plus le faux nom "Manila"
                currentData.forEach(obj => {
                    if (obj.propertySets) {
                        obj.propertySets.forEach(ps => {
                            if (ps.properties) {
                                // On affiche [Nom_Du_Dossier] Nom_Du_Paramètre pour que ce soit clair
                                Object.keys(ps.properties).forEach(k => props.add(`${ps.name} + ${k}`));
                            }
                        });
                    }
                });

                if (props.size > 0) {
                    const menu = document.getElementById('prop-selector');
                    menu.innerHTML = '<option value="">-- Choisissez un paramètre --</option>';
                    Array.from(props).sort().forEach(p => {
                        // Nettoyage de l'affichage
                        const displayName = p.replace(' + ', ' ➔ ');
                        menu.innerHTML += `<option value="${p}">${displayName}</option>`;
                    });
                    
                    document.getElementById('ui-filter').style.display = "block";
                    status.innerText = "✅ Succès ! Les paramètres sont prêts.";
                    this.innerText = "NOUVELLE ANALYSE";
                    this.style.backgroundColor = "#107c10";
                } else {
                    status.innerText = "⚠️ Les objets sélectionnés n'ont pas de propriétés BIM.";
                    this.innerText = "1. ANALYSER LA SÉLECTION";
                }
            } catch (err) {
                status.innerText = "❌ Erreur : " + err.message;
            }
        };

        document.getElementById('prop-selector').onchange = (e) => {
            const selectedVal = e.target.value;
            const res = document.getElementById('results');
            res.innerHTML = "";
            if (!selectedVal) return;

            // On sépare le nom du dossier et le nom du paramètre
            const parts = selectedVal.split(' + ');
            const targetPset = parts[0];
            const targetProp = parts[1];

            const groups = {};
            currentData.forEach(o => {
                let val = "Vide / Non défini";
                if (o.propertySets) {
                    o.propertySets.forEach(ps => {
                        if (ps.name === targetPset && ps.properties && ps.properties[targetProp] !== undefined) {
                            val = ps.properties[targetProp];
                        }
                    });
                }
                if (!groups[val]) groups[val] = [];
                groups[val].push(o.runtimeId || o.id);
            });

            Object.keys(groups).sort().forEach(v => {
                const div = document.createElement('div');
                div.className = "row";
                div.innerHTML = `<input type="checkbox" checked> <span style="margin-left:8px">${v}</span> <span class="count">(${groups[v].length})</span>`;
                div.querySelector('input').onchange = async (ev) => {
                    // Visibilité par opacité !
                    await API.viewer.setOpacity(groups[v], ev.target.checked ? 1 : 0);
                };
                res.appendChild(div);
            });
        };

        init();
    </script>
</body>
</html>
