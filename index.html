<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Filtre BIM Georges - DataTable</title>
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background: white; }
        .card { border: 2px solid #0078d4; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { width: 100%; padding: 12px; background: #0078d4; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #status { font-size: 11px; color: #666; margin-bottom: 10px; background: #f0f0f0; padding: 5px; border-radius: 3px; min-height: 20px; }
        select { width: 100%; margin-top: 15px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .row { display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #eee; font-size: 12px; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Filtre : 01_MANILA (Table)</h3>
        <div id="status">✅ Système prêt</div>
        <button id="btn-scan">SCANNER LE TABLEAU</button>
        <div id="ui-filter" style="display:none;">
            <select id="prop-selector"></select>
            <div id="results"></div>
        </div>
    </div>

    <script>
        let API = null;
        let tableData = [];

        async function init() {
            try {
                API = await TrimbleConnectWorkspace.connect(window.parent);
                if(API.extension && API.extension.requestPermission) {
                    await API.extension.requestPermission("accesstoken");
                }
            } catch (e) { console.error(e); }
        }

        document.getElementById('btn-scan').onclick = async function() {
            const btn = this;
            const status = document.getElementById('status');
            btn.innerText = "⏳ LECTURE DU TABLEAU...";
            btn.style.backgroundColor = "#ff9800";

            try {
                // 1. Récupérer les IDs sélectionnés dans le Viewer
                const ids = await API.viewer.getSelection();
                
                if (!ids || ids.length === 0) {
                    status.innerText = "⚠️ Sélectionnez des objets dans la vue 3D !";
                    btn.innerText = "SCANNER LE TABLEAU";
                    btn.style.backgroundColor = "#0078d4";
                    return;
                }

                // 2. UTILISER LE MODULE DATATABLE (Détecté sur ta capture)
                // On demande les lignes du tableau pour les IDs sélectionnés
                const result = await API.dataTable.getRows(ids);
                tableData = result || [];

                const props = new Set();
                tableData.forEach(row => {
                    if (row.properties) {
                        Object.keys(row.properties).forEach(k => props.add(k));
                    }
                });

                const sel = document.getElementById('prop-selector');
                if (props.size > 0) {
                    sel.innerHTML = '<option value="">-- ' + props.size + ' Colonnes trouvées --</option>';
                    Array.from(props).sort().forEach(p => {
                        sel.innerHTML += `<option value="${p}">${p}</option>`;
                    });
                    document.getElementById('ui-filter').style.display = "block";
                    btn.innerText = "✅ SCAN RÉUSSI";
                    btn.style.backgroundColor = "#107c10";
                    status.innerText = "✅ " + tableData.length + " lignes récupérées.";
                } else {
                    btn.innerText = "⚠️ TABLEAU VIDE";
                    status.innerText = "Assurez-vous que le tableau '01_MANILA' est bien ouvert en bas.";
                    btn.style.backgroundColor = "#666";
                }
            } catch (err) {
                btn.innerText = "❌ ERREUR";
                btn.style.backgroundColor = "#d13438";
                status.innerText = "Détail : " + err.message;
            }
        };

        document.getElementById('prop-selector').onchange = (e) => {
            const p = e.target.value;
            const res = document.getElementById('results');
            res.innerHTML = "";
            const groups = {};

            tableData.forEach(row => {
                let v = "Non défini";
                if (row.properties && row.properties[p] !== undefined) {
                    v = row.properties[p];
                }
                if(!groups[v]) groups[v] = [];
                groups[v].push(row.id);
            });

            Object.keys(groups).sort().forEach(v => {
                const div = document.createElement('div');
                div.className = "row";
                div.innerHTML = `<input type="checkbox" checked> <span style="margin-left:8px">${v} (${groups[v].length})</span>`;
                div.querySelector('input').onchange = (ev) => {
                    API.view.setObjectVisibility(groups[v], ev.target.checked);
                };
                res.appendChild(div);
            });
        };
        init();
    </script>
</body>
</html>
