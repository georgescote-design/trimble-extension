<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Filtre avancé par catégorie</title>
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 15px; background: white; }
        .card { border: 2px solid #2c3e50; padding: 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h3 { margin-top: 0; color: #2c3e50; font-size: 16px; margin-bottom: 0; }
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        
        #btn-lang { background: #ecf0f1; border: 1px solid #bdc3c7; border-radius: 4px; padding: 4px 8px; cursor: pointer; font-size: 12px; font-weight: bold; color: #2c3e50; transition: background 0.2s; }
        #btn-lang:hover { background: #d5dbdb; }

        #status { font-size: 12px; padding: 8px; background: #ecf0f1; border-radius: 4px; margin-bottom: 15px; color: #34495e; }
        .upload-label { display: block; border: 2px dashed #3498db; border-radius: 8px; padding: 25px 10px; text-align: center; background: #ebf5fb; color: #2980b9; cursor: pointer; transition: all 0.3s ease; margin-bottom: 15px; font-weight: bold; font-size: 13px; }
        .upload-label:hover { background: #3498db; color: white; border-color: #2980b9; transform: scale(1.02); }
        #file-input { display: none; }
        
        select { width: 100%; padding: 10px; border: 2px solid #3498db; border-radius: 4px; margin-bottom: 10px; font-size: 13px; }
        .row { display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #eee; font-size: 13px; transition: background 0.2s; }
        .row:hover { background: #f9f9f9; }
        .count { color: #7f8c8d; font-weight: bold; margin-left: auto; font-size: 11px; }
        
        input[type="color"] { border: none; width: 24px; height: 24px; border-radius: 4px; cursor: pointer; margin-left: 8px; margin-right: 8px; padding: 0; background: none; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 1px solid #bdc3c7; border-radius: 4px; }
        
        #btn-reset { background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 4px; font-size: 11px; cursor: pointer; font-weight: bold; display: none; margin-bottom: 10px; width: 100%; }
        #btn-reset:hover { background: #c0392b; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header-container">
            <h3 id="ui-title">Filtre avancé par catégorie</h3>
            <button id="btn-lang" title="Changer de langue">🇬🇧 EN</button>
        </div>
        
        <div id="status">⏳ Chargement de l'interface...</div>
        
        <label for="file-input" class="upload-label" id="upload-zone">
            📂 CLIQUEZ ICI POUR IMPORTER LE CSV
        </label>
        <input type="file" id="file-input" accept=".csv" />
        
        <div id="ui-filter" style="display:none;">
            <p id="label-filter" style="font-size:12px; margin-bottom:5px; font-weight: bold; color: #2c3e50;">Filtrer par :</p>
            <select id="prop-selector"></select>
            <button id="btn-reset">🔄 TOUT RÉAFFICHER & RÉINITIALISER COULEURS</button>
            <div id="results" style="margin-top:10px;"></div>
        </div>
    </div>

    <script>
        // ==========================================
        // LE NOM OFFICIEL DE L'APPLICATION :
        const TON_NOM = "G.Côté Groupe Canam inc."; 
        // ==========================================

        let API = null;
        let tableData = [];
        let guidColumnName = "";
        let currentLang = 'fr';

        // LE DICTIONNAIRE MULTILINGUE (i18n)
        const i18n = {
            fr: {
                title: `Filtre par catégorie - ${TON_NOM}`,
                upload: "📂 CLIQUEZ ICI POUR IMPORTER LE CSV",
                filterBy: "Filtrer par :",
                reset: "🔄 TOUT RÉAFFICHER & RÉINITIALISER COULEURS",
                statusConnecting: "⏳ Connexion à Trimble en cours...",
                statusConnected: "✅ Connecté. Prêt à lire les données.",
                statusErrorConn: "❌ Erreur : Veuillez rafraîchir la page (F5).",
                statusLoading: "⏳ Analyse en cours...",
                statusMissingGuid: "❌ Erreur : Colonne 'GUID' manquante.",
                statusLoaded: (count) => `✅ Données chargées (${count} objets).`,
                selectParam: "-- Sélectionnez un paramètre --",
                prepFilter: "⏳ Préparation du filtre...",
                langBtn: "🇬🇧 EN",
                notDefined: "Non défini"
            },
            en: {
                title: `Category Filter - ${TON_NOM}`,
                upload: "📂 CLICK HERE TO IMPORT CSV",
                filterBy: "Filter by:",
                reset: "🔄 SHOW ALL & RESET COLORS",
                statusConnecting: "⏳ Connecting to Trimble...",
                statusConnected: "✅ Connected. Ready to read data.",
                statusErrorConn: "❌ Error: Please refresh the page (F5).",
                statusLoading: "⏳ Analyzing...",
                statusMissingGuid: "❌ Error: 'GUID' column missing.",
                statusLoaded: (count) => `✅ Data loaded (${count} objects).`,
                selectParam: "-- Select a parameter --",
                prepFilter: "⏳ Preparing filter...",
                langBtn: "🇫🇷 FR",
                notDefined: "Undefined"
            }
        };

        function t(key, param) {
            if (typeof i18n[currentLang][key] === 'function') return i18n[currentLang][key](param);
            return i18n[currentLang][key];
        }

        function updateUI() {
            document.getElementById('ui-title').innerText = t('title');
            document.getElementById('upload-zone').innerText = t('upload');
            document.getElementById('label-filter').innerText = t('filterBy');
            document.getElementById('btn-reset').innerText = t('reset');
            document.getElementById('btn-lang').innerText = t('langBtn');

            const menu = document.getElementById('prop-selector');
            if (menu && menu.options.length > 0 && menu.options[0].value === "") {
                menu.options[0].text = t('selectParam');
            }

            const statusDiv = document.getElementById('status');
            if (tableData.length > 0) {
                statusDiv.innerText = t('statusLoaded', tableData.length);
            }
        }

        document.getElementById('btn-lang').onclick = () => {
            currentLang = currentLang === 'fr' ? 'en' : 'fr';
            updateUI();
            
            // Forcer la mise à jour du statut si on est dans l'état de base
            if (tableData.length === 0) {
                document.getElementById('status').innerText = API ? t('statusConnected') : t('statusErrorConn');
            }
        };

        function hexToRgba(hex) {
            let c = hex.substring(1).split('');
            if(c.length === 3){ c = [c[0], c[0], c[1], c[1], c[2], c[2]]; }
            c = '0x' + c.join('');
            return { r: (c >> 16) & 255, g: (c >> 8) & 255, b: c & 255, a: 255 };
        }

        // L'ORDRE EST CORRIGÉ ICI : On met à jour l'UI AVANT de bloquer sur l'API
        async function init() {
            updateUI(); // Affiche ton nom et l'interface immédiatement
            document.getElementById('status').innerText = t('statusConnecting');
            
            try { 
                API = await TrimbleConnectWorkspace.connect(window.parent); 
                document.getElementById('status').innerText = t('statusConnected');
            } 
            catch (e) { 
                document.getElementById('status').innerText = t('statusErrorConn'); 
            }
        }

        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('status').innerText = t('statusLoading');

            Papa.parse(file, {
                header: true, skipEmptyLines: true,
                complete: function(results) {
                    tableData = results.data;
                    const headers = results.meta.fields;
                    guidColumnName = headers.find(h => h.toUpperCase().includes("GUID"));
                    
                    if (!guidColumnName) {
                        document.getElementById('status').innerText = t('statusMissingGuid'); 
                        return;
                    }

                    const menu = document.getElementById('prop-selector');
                    menu.innerHTML = `<option value="">${t('selectParam')}</option>`;
                    headers.forEach(h => { 
                        if (h !== guidColumnName) menu.innerHTML += `<option value="${h}">${h}</option>`; 
                    });

                    document.getElementById('ui-filter').style.display = "block";
                    document.getElementById('upload-zone').style.display = "none";
                    document.getElementById('status').innerText = t('statusLoaded', tableData.length);
                }
            });
        });

        document.getElementById('prop-selector').onchange = async (e) => {
            const selectedCol = e.target.value;
            const res = document.getElementById('results');
            const btnReset = document.getElementById('btn-reset');
            
            res.innerHTML = t('prepFilter');
            if (!selectedCol) { res.innerHTML = ""; btnReset.style.display = "none"; return; }
            btnReset.style.display = "block";

            const groups = {};
            tableData.forEach(row => {
                let val = row[selectedCol] || t('notDefined');
                if (!groups[val]) groups[val] = [];
                if (row[guidColumnName]) groups[val].push(row[guidColumnName]);
            });

            res.innerHTML = "";

            Object.keys(groups).sort().forEach(val => {
                const div = document.createElement('div');
                div.className = "row";
                div.innerHTML = `
                    <input type="checkbox" class="vis-check" checked title="Afficher/Masquer"> 
                    <input type="color" class="color-picker" value="#95a5a6" title="Peindre">
                    <span style="font-weight: 500;">${val}</span> 
                    <span class="count">(${groups[val].length})</span>
                `;
                
                const checkbox = div.querySelector('.vis-check');
                const colorPicker = div.querySelector('.color-picker');
                let cachedSelector = null;

                const getObjectSelector = async () => {
                    if (cachedSelector) return cachedSelector;
                    const models = await API.viewer.getModels();
                    let modelObjectsArray = [];
                    for (const model of models) {
                        const mId = model.id || model.modelId;
                        if (!mId) continue;
                        try {
                            const rIds = await API.viewer.convertToObjectRuntimeIds(mId, groups[val]);
                            if (rIds && rIds.length > 0) {
                                modelObjectsArray.push({ modelId: mId, objectRuntimeIds: rIds });
                            }
                        } catch (err) {} 
                    }
                    if (modelObjectsArray.length > 0) cachedSelector = { modelObjectIds: modelObjectsArray };
                    return cachedSelector;
                };

                checkbox.onchange = async () => {
                    if(!API) return;
                    const selector = await getObjectSelector();
                    if (selector) await API.viewer.setObjectState(selector, { visible: checkbox.checked });
                };

                colorPicker.addEventListener('input', async (ev) => {
                    if(!API) return;
                    const selector = await getObjectSelector();
                    if (selector) {
                        const trimbleColor = hexToRgba(ev.target.value);
                        await API.viewer.setObjectState(selector, { color: trimbleColor, visible: true });
                        checkbox.checked = true; 
                    }
                });

                res.appendChild(div);
            });
        };

        document.getElementById('btn-reset').onclick = async () => {
            if(!API) return;
            try { await API.viewer.resetColors(); } catch(e) {}
            
            const checkboxes = document.querySelectorAll('.vis-check');
            checkboxes.forEach(chk => {
                if(!chk.checked) {
                    chk.checked = true;
                    chk.dispatchEvent(new Event('change')); 
                }
            });
            
            const colorPickers = document.querySelectorAll('.color-picker');
            colorPickers.forEach(cp => cp.value = "#95a5a6");
        };

        init();
    </script>
</body>
</html>
