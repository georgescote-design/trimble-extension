<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="trimble.api.js"></script>
    <style>
        body { font-family: sans-serif; padding: 10px; background: white; text-align: center; }
        .card { border: 2px solid #0078d4; padding: 15px; border-radius: 8px; }
        button { width: 100%; padding: 12px; background: #0078d4; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        #status { margin-top: 10px; font-size: 13px; color: #0078d4; }
    </style>
</head>
<body>
    <div class="card">
        <h3 style="margin:0;">Générateur de Calques</h3>
        <div id="status">🔄 Initialisation...</div>
        <button id="btn-scan" style="display:none;">Scanner la sélection</button>
        
        <div id="ui-area" style="display:none; margin-top:15px; border-top: 1px solid #eee; padding-top:10px;">
            <select id="prop-selector" style="width:100%; padding:8px;"></select>
            <div id="layers" style="text-align:left; margin-top:10px;"></div>
        </div>
    </div>

    <script>
        let api = null;
        let selectionProps = [];

        async function start() {
            const status = document.getElementById('status');
            const btn = document.getElementById('btn-scan');
            
            try {
                // On force la poignée de main
                api = await TrimbleConnectWorkspace.connect();
                status.innerHTML = "✅ <b>Connecté !</b>";
                status.style.color = "green";
                btn.style.display = "block";
            } catch (e) {
                status.innerText = "Attente de Trimble (vérifiez les cookies)...";
                setTimeout(start, 2000); // Réessaie toutes les 2 sec
            }
        }

        document.getElementById('btn-scan').onclick = async () => {
            const status = document.getElementById('status');
            const ids = await api.ui.getSelection();
            if (!ids || ids.length === 0) return alert("Sélectionnez des objets en 3D !");
            
            status.innerText = "Analyse...";
            selectionProps = await api.project.getProperties(ids);
            const names = new Set();
            selectionProps.forEach(obj => {
                if (obj.properties) Object.keys(obj.properties).forEach(n => names.add(n));
                if (obj.propertySets) obj.propertySets.forEach(ps => {
                    if (ps.properties) Object.keys(ps.properties).forEach(n => names.add(n));
                });
            });

            const sel = document.getElementById('prop-selector');
            sel.innerHTML = '<option value="">-- Choisir un paramètre --</option>';
            Array.from(names).sort().forEach(n => {
                const opt = document.createElement('option');
                opt.value = opt.innerText = n;
                sel.appendChild(opt);
            });
            document.getElementById('ui-area').style.display = 'block';
            status.innerText = "Prêt.";
        };

        document.getElementById('prop-selector').onchange = (e) => {
            const prop = e.target.value;
            const container = document.getElementById('layers');
            container.innerHTML = "";
            const groups = {};

            selectionProps.forEach(obj => {
                let val = "Inconnu";
                if (obj.properties && obj.properties[prop]) val = obj.properties[prop];
                else if (obj.propertySets) {
                    obj.propertySets.forEach(ps => { if(ps.properties && ps.properties[prop]) val = ps.properties[prop]; });
                }
                if (!groups[val]) groups[val] = [];
                groups[val].push(obj.id);
            });

            Object.keys(groups).sort().forEach(v => {
                const div = document.createElement('div');
                div.style.padding = "5px";
                div.innerHTML = `<label><input type="checkbox" checked> ${v} (${groups[v].length})</label>`;
                div.querySelector('input').onchange = (ev) => api.visual.setObjectVisibility(groups[v], ev.target.checked);
                container.appendChild(div);
            });
        };

        start();
    </script>
</body>
</html>
