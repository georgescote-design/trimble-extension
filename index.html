<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Filtre BIM Georges</title>
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background: white; }
        .card { border: 2px solid #0078d4; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h3 { margin-top: 0; color: #333; font-size: 15px; }
        button { width: 100%; padding: 12px; background: #0078d4; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #status { font-size: 11px; color: #666; margin-bottom: 10px; background: #f0f0f0; padding: 5px; border-radius: 3px; min-height: 20px; }
        select { width: 100%; margin-top: 15px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .row { display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #eee; font-size: 12px; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Filtre : 01_MANILA w PARAMETRIC</h3>
        <div id="status">✅ Prêt</div>
        <button id="btn-scan">SCANNER LA SÉLECTION</button>
        <div id="ui-filter" style="display:none;">
            <select id="prop-selector" style="margin-top:10px;"></select>
            <div id="results" style="margin-top:10px;"></div>
        </div>
    </div>

    <script>
        let API = null;
        let selectionData = [];
        const TARGET_SET = "01_MANILA w PARAMETRIC";

        async function init() {
            try {
                API = await TrimbleConnectWorkspace.connect(window.parent);
                document.getElementById('status').innerText = "✅ Système prêt";
            } catch (e) { console.error(e); }
        }

        document.getElementById('btn-scan').onclick = async function() {
            const btn = this;
            const status = document.getElementById('status');
            btn.innerText = "⏳ SCAN EN COURS...";
            
            try {
                // 1. On tente de récupérer la sélection
                let rawSelection = await API.viewer.getSelection();
                
                // Si vide, on attend 200ms et on réessaie (parfois le clic est trop rapide)
                if (!rawSelection || rawSelection.length === 0) {
                    await new Promise(r => setTimeout(r, 200));
                    rawSelection = await API.viewer.getSelection();
                }

                if (!rawSelection || rawSelection.length === 0) {
                    status.innerText = "⚠️ Cliquez sur l'objet AVANT le bouton !";
                    btn.innerText = "SCANNER LA SÉLECTION";
                    return;
                }

                // Extraction ID avec nettoyage profond
                const ids = rawSelection.map(item => {
                    if (typeof item === 'string') return item;
                    return item.id || item.runtimeId || item.objectId;
                }).filter(id => id !== undefined);

                status.innerText = "Analyse de " + ids.length + " objets...";

                // 2. On essaie de récupérer les propriétés (viewer puis project)
                let results = [];
                try {
                    results = await API.viewer.getObjectProperties(ids);
                } catch(e) {
                    results = await API.project.getProperties(ids);
                }
                
                selectionData = results || [];
                const props = new Set();
                
                selectionData.forEach(obj => {
                    if (obj.propertySets) {
                        obj.propertySets.forEach(ps => {
                            if (ps.name && ps.name.trim() === TARGET_SET && ps.properties) {
                                Object.keys(ps.properties).forEach(k => props.add(k));
                            }
                        });
                    }
                    if (obj.properties) Object.keys(obj.properties).forEach(k => props.add(k));
                });

                if (props.size > 0) {
                    const sel = document.getElementById('prop-selector');
                    sel.innerHTML = '<option value="">-- ' + props.size + ' Paramètres trouvés --</option>';
                    Array.from(props).sort().forEach(p => sel.innerHTML += `<option value="${p}">${p}</option>`);
                    document.getElementById('ui-filter').style.display = "block";
                    btn.innerText = "✅ SCAN RÉUSSI";
                    btn.style.backgroundColor = "#107c10";
                } else {
                    btn.innerText = "⚠️ AUCUNE DONNÉE";
                    status.innerText = "Sélection OK, mais Manila non trouvé sur ces objets.";
                    btn.style.backgroundColor = "#666";
                }

            } catch (err) {
                status.innerText = "Erreur: " + err.message;
                btn.innerText = "❌ ERREUR";
            }
        };

        document.getElementById('prop-selector').onchange = (e) => {
            const p = e.target.value;
            const res = document.getElementById('results');
            res.innerHTML = "";
            if (!p) return;

            const groups = {};
            selectionData.forEach(o => {
                let v = "Inconnu";
                if (o.propertySets) {
                    o.propertySets.forEach(ps => {
                        if (ps.name && ps.name.trim() === TARGET_SET && ps.properties && ps.properties[p] !== undefined) {
                            v = ps.properties[p];
                        }
                    });
                }
                if (v === "Inconnu" && o.properties && o.properties[p] !== undefined) v = o.properties[p];
                
                if(!groups[v]) groups[v] = [];
                groups[v].push(o.id || o.runtimeId);
            });

            Object.keys(groups).sort().forEach(v => {
                const div = document.createElement('div');
                div.className = "row";
                div.innerHTML = `<input type="checkbox" checked> <span style="margin-left:8px">${v} (${groups[v].length})</span>`;
                
                div.querySelector('input').onchange = async (ev) => {
                    try {
                        const targetIds = groups[v];
                        if (API.viewer && API.viewer.setObjectVisibility) {
                            await API.viewer.setObjectVisibility(targetIds, ev.target.checked);
                        } else if (API.view && API.view.setObjectVisibility) {
                            await API.view.setObjectVisibility(targetIds, ev.target.checked);
                        }
                    } catch (err) { console.error(err); }
                };
                res.appendChild(div);
            });
        };

        init();
    </script>
</body>
</html>
