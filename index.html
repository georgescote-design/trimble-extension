<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer-when-downgrade">
    <script src="trimble.api.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background: white; }
        .card { border: 1px solid #0078d4; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { width: 100%; padding: 12px; background: #0078d4; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; }
        #status { margin-top: 10px; font-size: 12px; color: #0078d4; font-weight: bold; text-align: center; }
        select { width: 100%; padding: 10px; margin-top: 10px; }
        .layer-item { display: flex; align-items: center; margin-top: 5px; padding: 8px; border-radius: 4px; border-left: 5px solid #0078d4; background: #f9f9f9; font-size: 13px; }
    </style>
</head>
<body>

    <div class="card">
        <h3 style="margin-top:0; color:#0078d4;">Générateur de Calques</h3>
        <button id="btn-scan" disabled>Connexion à Trimble...</button>
        <div id="status">Initialisation du script...</div>
        
        <div id="ui-area" style="display:none; margin-top:15px; border-top: 1px dotted #ccc; padding-top:10px;">
            <select id="prop-selector"></select>
            <div id="layers" style="margin-top:10px;"></div>
        </div>
    </div>

    <script>
        let api = null;
        let selectionProps = [];

        async function start() {
            const status = document.getElementById('status');
            const btn = document.getElementById('btn-scan');
            
            try {
                // On vérifie si notre fichier local est bien chargé
                if (typeof TrimbleConnectWorkspace === 'undefined') {
                    status.innerText = "❌ Le fichier trimble.api.js est introuvable sur GitHub.";
                    return;
                }

                status.innerText = "Tentative de connexion...";
                api = await TrimbleConnectWorkspace.connect();
                
                status.innerText = "✅ Connecté avec succès !";
                btn.disabled = false;
                btn.innerText = "Scanner la sélection";
            } catch (e) {
                status.innerText = "⚠️ Erreur de poignée de main. Vérifiez les cookies.";
                console.error(e);
            }
        }

        document.getElementById('btn-scan').onclick = async () => {
            const status = document.getElementById('status');
            try {
                const ids = await api.ui.getSelection();
                if (ids.length === 0) {
                    status.innerText = "⚠️ Sélectionnez des objets en 3D !";
                    return;
                }
                
                status.innerText = "Analyse de " + ids.length + " objets...";
                selectionProps = await api.project.getProperties(ids);
                
                const names = new Set();
                selectionProps.forEach(obj => {
                    if (obj.properties) Object.keys(obj.properties).forEach(n => names.add(n));
                    if (obj.propertySets) obj.propertySets.forEach(ps => {
                        if (ps.properties) Object.keys(ps.properties).forEach(n => names.add(n));
                    });
                });

                const sel = document.getElementById('prop-selector');
                sel.innerHTML = '<option value="">-- Choisir un paramètre --</option>';
                Array.from(names).sort().forEach(n => {
                    const opt = document.createElement('option');
                    opt.value = opt.innerText = n;
                    sel.appendChild(opt);
                });
                document.getElementById('ui-area').style.display = 'block';
                status.innerText = "Analyse terminée.";
            } catch (e) {
                status.innerText = "Erreur scan : " + e.message;
            }
        };

        document.getElementById('prop-selector').onchange = (e) => {
            const prop = e.target.value;
            const container = document.getElementById('layers');
            container.innerHTML = "";
            if (!prop) return;

            const groups = {};
            selectionProps.forEach(obj => {
                let val = "Non renseigné";
                if (obj.properties && obj.properties[prop]) val = obj.properties[prop];
                else if (obj.propertySets) {
                    obj.propertySets.forEach(ps => { if(ps.properties && ps.properties[prop]) val = ps.properties[prop]; });
                }
                if (!groups[val]) groups[val] = [];
                groups[val].push(obj.id);
            });

            Object.keys(groups).sort().forEach(v => {
                const div = document.createElement('div');
                div.className = 'layer-item';
                div.innerHTML = `<input type="checkbox" checked> <span style="margin-left:8px">${v} (${groups[v].length})</span>`;
                div.querySelector('input').onchange = (ev) => api.visual.setObjectVisibility(groups[v], ev.target.checked);
                container.appendChild(div);
            });
        };

        window.onload = start;
    </script>
</body>
</html>
