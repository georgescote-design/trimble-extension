<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://connect-extensions.trimble.com/js/trimble.connect.workspace.api.js"></script>
</head>
<body style="background: white; padding: 20px; border: 5px solid red;">

    <h2 id="titre">Test de Connexion Directe</h2>
    <p id="status">Statut : En attente du signal Trimble...</p>
    <button id="btn-action" style="display:none; padding:15px; background:blue; color:white;">Scanner</button>

    <script>
        // On essaie de se connecter immédiatement et de force
        async function start() {
            const status = document.getElementById('status');
            try {
                // On force l'API à se réveiller
                const api = await TrimbleConnectWorkspace.connect();
                status.innerHTML = "<b style='color:green'>ENFIN CONNECTÉ !</b>";
                document.body.style.borderColor = "green";
                document.getElementById('btn-action').style.display = "block";
                
                document.getElementById('btn-action').onclick = async () => {
                    const sel = await api.ui.getSelection();
                    alert("Succès ! Objets sélectionnés : " + sel.length);
                };
            } catch (err) {
                status.innerText = "Trimble ne répond pas. Erreur : " + err.message;
            }
        }

        // On lance le test
        start();
        // Et on relance après 3 secondes au cas où
        setTimeout(start, 3000);
    </script>
</body>
</html>
