<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Filtre avancé - Canam</title>
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 15px; background: white; }
        .card { border: 2px solid #2c3e50; padding: 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header-container { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        h3 { margin: 0; color: #2c3e50; font-size: 16px; }
        .author-tag { font-size: 11px; color: #7f8c8d; }
        #btn-lang { background: #ecf0f1; border: 1px solid #bdc3c7; border-radius: 4px; padding: 4px 8px; cursor: pointer; font-size: 11px; font-weight: bold; }
        #status { font-size: 12px; padding: 8px; background: #e8f4fd; border-radius: 4px; margin-bottom: 15px; color: #2980b9; border-left: 4px solid #3498db; }
        .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        select { width: 100%; padding: 8px; border: 2px solid #3498db; border-radius: 4px; font-size: 12px; }
        #btn-reset { background: #e74c3c; color: white; border: none; padding: 10px; border-radius: 4px; font-size: 11px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 15px; }
        .row { display: flex; align-items: center; padding: 6px 8px; border-bottom: 1px solid #eee; font-size: 12px; }
        .count { color: #7f8c8d; font-weight: bold; margin-left: auto; font-size: 10px; }
        .vis-check { width: 16px; height: 16px; margin-right: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header-container">
            <div>
                <h3 id="ui-title">Filtre avancé</h3>
                <span id="ui-author" class="author-tag">(G.Côté Groupe Canam inc.)</span>
            </div>
            <button id="btn-lang">🇬🇧 EN</button>
        </div>
        <div id="status">⏳ Connexion...</div>
        
        <input type="file" id="file-input" accept=".csv" style="display:none" />
        <label id="upload-label" for="file-input" style="display:block; border: 2px dashed #3498db; padding: 20px; text-align: center; cursor: pointer; margin-bottom: 15px; color: #3498db; font-weight: bold;">📂 IMPORTER CSV</label>

        <div id="ui-filter" style="display:none;">
            <div class="filter-grid">
                <div><label id="l1" style="font-size:11px; font-weight:bold;">Critère 1 :</label><select id="s1"></select></div>
                <div><label id="l2" style="font-size:11px; font-weight:bold;">Critère 2 :</label><select id="s2"></select></div>
            </div>
            <button id="btn-reset">🔄 RÉINITIALISER TOUT</button>
            <div id="results"></div>
        </div>
    </div>

    <script>
        let API = null;
        let tableData = [];
        let guidCol = "";
        let currentLang = 'fr';
        let selectionMemory = {}; 

        const i18n = {
            fr: { title: "Filtre avancé", reset: "🔄 RÉINITIALISER TOUT", l1: "Critère 1 :", l2: "Critère 2 :", wait: "⏳ Filtrage...", ready: "✅ Connecté.", load: (n) => `✅ ${n} objets chargés.` },
            en: { title: "Advanced Filter", reset: "🔄 RESET ALL", l1: "Criteria 1:", l2: "Criteria 2:", wait: "⏳ Filtering...", ready: "✅ Connected.", load: (n) => `✅ ${n} objects loaded.` }
        };

        async function init() {
            try { 
                API = await TrimbleConnectWorkspace.connect(window.parent); 
                document.getElementById('status').innerText = i18n[currentLang].ready;
            } catch (e) { document.getElementById('status').innerText = "❌ Erreur F5"; }
        }

        document.getElementById('file-input').onchange = (e) => {
            Papa.parse(e.target.files[0], {
                header: true, skipEmptyLines: true,
                complete: (r) => {
                    tableData = r.data;
                    guidCol = r.meta.fields.find(h => h.toUpperCase().includes("GUID"));
                    const options = `<option value="">-- Sélectionner --</option>` + r.meta.fields.filter(h => h !== guidCol).map(h => `<option value="${h}">${h}</option>`).join('');
                    document.getElementById('s1').innerHTML = options;
                    document.getElementById('s2').innerHTML = options;
                    document.getElementById('ui-filter').style.display = "block";
                    document.getElementById('upload-label').style.display = "none";
                    document.getElementById('status').innerText = i18n[currentLang].load(tableData.length);
                }
            });
        };

        async function runFilter() {
            const col1 = document.getElementById('s1').value;
            const col2 = document.getElementById('s2').value;
            const res = document.getElementById('results');
            if (!col1) return;

            res.innerHTML = i18n[currentLang].wait;

            // 1. On identifie quelles valeurs sont actuellement décochées (mémoire)
            const groups = {};
            tableData.forEach(row => {
                const val1 = row[col1] || "N/A";
                const val2 = col2 ? row[col2] : null;

                // LOGIQUE CROISÉE : On ne groupe que si le Critère 2 est respecté (si actif)
                if (!col2 || (col2 && val2)) {
                    if (!groups[val1]) groups[val1] = [];
                    groups[val1].push(row[guidCol]);
                }
            });

            res.innerHTML = "";
            Object.keys(groups).sort().forEach(val => {
                const isChecked = selectionMemory[val] !== false;
                const div = document.createElement('div');
                div.className = "row";
                div.innerHTML = `<input type="checkbox" class="vis-check" ${isChecked ? 'checked' : ''}> <span>${val}</span><span class="count">(${groups[val].length})</span>`;
                
                div.querySelector('input').onchange = async (ev) => {
                    selectionMemory[val] = ev.target.checked;
                    const models = await API.viewer.getModels();
                    for (const m of models) {
                        const rIds = await API.viewer.convertToObjectRuntimeIds(m.id || m.modelId, groups[val]);
                        if (rIds.length) {
                            await API.viewer.setObjectState({ modelObjectIds: [{ modelId: m.id || m.modelId, objectRuntimeIds: rIds }] }, { visible: ev.target.checked });
                        }
                    }
                };
                res.appendChild(div);
            });
        }

        document.getElementById('s1').onchange = runFilter;
        document.getElementById('s2').onchange = runFilter;
        document.getElementById('btn-reset').onclick = async () => {
            await API.viewer.resetColors();
            const models = await API.viewer.getModels();
            for (const m of models) await API.viewer.setObjectState({ modelId: m.id || m.modelId, all: true }, { visible: true });
            selectionMemory = {};
            runFilter();
        };

        init();
    </script>
</body>
</html>
