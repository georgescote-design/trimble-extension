<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Filtre BIM Georges - Pur Viewer</title>
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background: white; }
        .card { border: 2px solid #0078d4; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { width: 100%; padding: 12px; background: #0078d4; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #status { font-size: 11px; color: #666; margin-bottom: 10px; background: #f0f0f0; padding: 5px; border-radius: 3px; min-height: 20px; }
        select { width: 100%; margin-top: 15px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .row { display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #eee; font-size: 12px; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Explorateur Pur Viewer</h3>
        <div id="status">⏳ Initialisation...</div>
        <button id="btn-scan">SCANNER TOUT</button>
        <div id="ui-filter" style="display:none;">
            <select id="prop-selector"></select>
            <div id="results" style="margin-top:10px;"></div>
        </div>
    </div>

    <script>
        let API = null;
        let selectionData = [];

        async function init() {
            try {
                API = await TrimbleConnectWorkspace.connect(window.parent);
                document.getElementById('status').innerText = "✅ Prêt (Viewer Only)";
            } catch (e) { document.getElementById('status').innerText = "❌ Erreur de connexion"; }
        }

        document.getElementById('btn-scan').onclick = async function() {
            const btn = this;
            const status = document.getElementById('status');
            btn.innerText = "⏳ LECTURE...";
            
            try {
                // Étape 1 : Récupérer les IDs (Viewer uniquement)
                const rawSelection = await API.viewer.getSelection();
                const ids = rawSelection.map(item => (typeof item === 'object' ? (item.id || item.runtimeId) : item));

                if (!ids || ids.length === 0) {
                    status.innerText = "⚠️ Sélectionnez un objet !";
                    btn.innerText = "SCANNER TOUT";
                    return;
                }

                // Étape 2 : Récupérer les propriétés (Viewer uniquement)
                // Commande exacte : getObjectProperties
                selectionData = await API.viewer.getObjectProperties(ids);
                
                const props = new Set();
                selectionData.forEach(obj => {
                    // On scanne les propriétés racines
                    if (obj.properties) Object.keys(obj.properties).forEach(k => props.add(k));
                    
                    // On scanne TOUS les PropertySets
                    if (obj.propertySets) {
                        obj.propertySets.forEach(ps => {
                            if (ps.properties) Object.keys(ps.properties).forEach(k => props.add(k));
                        });
                    }
                });

                if (props.size > 0) {
                    const sel = document.getElementById('prop-selector');
                    sel.innerHTML = '<option value="">-- ' + props.size + ' Paramètres --</option>';
                    Array.from(props).sort().forEach(p => sel.innerHTML += `<option value="${p}">${p}</option>`);
                    document.getElementById('ui-filter').style.display = "block";
                    btn.innerText = "✅ SCAN RÉUSSI";
                    btn.style.backgroundColor = "#107c10";
                    status.innerText = "✅ " + ids.length + " objets lus.";
                } else {
                    btn.innerText = "⚠️ VIDE";
                    status.innerText = "Aucun paramètre trouvé dans le Viewer.";
                }
            } catch (err) {
                status.innerText = "Erreur: " + err.message;
                btn.innerText = "❌ ERREUR";
            }
        };

        document.getElementById('prop-selector').onchange = (e) => {
            const p = e.target.value;
            const res = document.getElementById('results');
            res.innerHTML = "";
            if (!p) return;

            const groups = {};
            selectionData.forEach(o => {
                let v = "Inconnu";
                if (o.properties && o.properties[p] !== undefined) v = o.properties[p];
                else if (o.propertySets) {
                    o.propertySets.forEach(ps => {
                        if (ps.properties && ps.properties[p] !== undefined) v = ps.properties[p];
                    });
                }
                if(!groups[v]) groups[v] = [];
                groups[v].push(o.id || o.runtimeId);
            });

            Object.keys(groups).sort().forEach(v => {
                const div = document.createElement('div');
                div.className = "row";
                div.innerHTML = `<input type="checkbox" checked> <span style="margin-left:8px">${v} (${groups[v].length})</span>`;
                div.querySelector('input').onchange = async (ev) => {
                    // Commande de visibilité Viewer
                    await API.viewer.setObjectVisibility(groups[v], ev.target.checked);
                };
                res.appendChild(div);
            });
        };

        init();
    </script>
</body>
</html>
