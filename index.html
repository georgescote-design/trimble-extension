<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Filtre BIM - Haute Performance</title>
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 15px; background: white; color: #2c3e50; }
        .card { border: 2px solid #2c3e50; padding: 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header-container { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        h3 { margin: 0; font-size: 16px; color: #2c3e50; }
        .author-tag { font-size: 11px; color: #7f8c8d; }
        #btn-lang { background: #ecf0f1; border: 1px solid #bdc3c7; border-radius: 4px; padding: 4px 8px; cursor: pointer; font-size: 11px; font-weight: bold; }
        #status { font-size: 12px; padding: 8px; background: #e8f4fd; border-radius: 4px; margin-bottom: 15px; color: #2980b9; border-left: 4px solid #3498db; }
        .upload-label { display: block; border: 2px dashed #3498db; padding: 20px; text-align: center; cursor: pointer; margin-bottom: 15px; color: #3498db; font-weight: bold; border-radius: 8px; }
        #file-input { display: none; }
        select { width: 100%; padding: 10px; border: 2px solid #3498db; border-radius: 4px; margin-bottom: 10px; font-size: 13px; }
        .row { display: flex; align-items: center; padding: 6px 8px; border-bottom: 1px solid #eee; font-size: 12px; }
        .count { color: #7f8c8d; font-weight: bold; margin-left: auto; font-size: 10px; }
        input[type="color"] { border: none; width: 22px; height: 22px; border-radius: 4px; cursor: pointer; margin: 0 10px; padding: 0; background: none; }
        #btn-reset { background: #e74c3c; color: white; border: none; padding: 12px; border-radius: 4px; font-size: 11px; cursor: pointer; font-weight: bold; display: none; margin-bottom: 10px; width: 100%; transition: background 0.2s; }
        #btn-reset:hover { background: #c0392b; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header-container">
            <div class="title-group">
                <h3 id="ui-title">Filtre avancé par catégorie</h3>
                <span id="ui-author" class="author-tag">(G.Côté Groupe Canam inc.)</span>
            </div>
            <button id="btn-lang">🇬🇧 EN</button>
        </div>
        <div id="status">⏳ Initialisation...</div>
        <label for="file-input" class="upload-label" id="upload-zone">📂 IMPORTER CSV (17k+ OBJETS OPTIMISÉS)</label>
        <input type="file" id="file-input" accept=".csv" />
        
        <div id="ui-filter" style="display:none;">
            <p id="label-filter" style="font-size:12px; font-weight: bold; margin-bottom: 5px;">Filtrer par :</p>
            <select id="prop-selector"></select>
            <button id="btn-reset">🔄 RÉINITIALISER LA VUE</button>
            <div id="results"></div>
        </div>
    </div>

    <script>
        const TON_NOM = "G.Côté Groupe Canam inc."; 
        let API = null;
        let tableData = [];
        let guidCol = "";
        let currentLang = 'fr';
        
        // Caches pour la performance
        let cachedRuntimeIds = {}; 

        const i18n = {
            fr: { title: "Filtre avancé par catégorie", author: `(${TON_NOM})`, upload: "📂 IMPORTER CSV", filterBy: "Filtrer par :", reset: "🔄 RÉINITIALISER LA VUE (RAPIDE)", statusConnected: "✅ Prêt.", statusLoading: "⏳ Analyse des données...", statusLoaded: (n) => `✅ ${n} objets optimisés.`, selectParam: "-- Choisir un paramètre --", langBtn: "🇬🇧 EN", notDefined: "Non défini" },
            en: { title: "Advanced Category Filter", author: `(${TON_NOM})`, upload: "📂 IMPORT CSV", filterBy: "Filter by:", reset: "🔄 RESET VIEW (FAST)", statusConnected: "✅ Ready.", statusLoading: "⏳ Analyzing data...", statusLoaded: (n) => `✅ ${n} optimized objects.`, selectParam: "-- Select parameter --", langBtn: "🇫🇷 FR", notDefined: "Undefined" }
        };

        function t(key, param) { return (typeof i18n[currentLang][key] === 'function') ? i18n[currentLang][key](param) : i18n[currentLang][key]; }

        function updateUI() {
            document.getElementById('ui-title').innerText = t('title');
            document.getElementById('ui-author').innerText = t('author');
            document.getElementById('upload-zone').innerText = t('upload');
            document.getElementById('label-filter').innerText = t('filterBy');
            document.getElementById('btn-reset').innerText = t('reset');
            document.getElementById('btn-lang').innerText = t('langBtn');
        }

        async function init() {
            try { 
                API = await TrimbleConnectWorkspace.connect(window.parent); 
                document.getElementById('status').innerText = t('statusConnected');
                updateUI();
            } catch (e) { document.getElementById('status').innerText = "❌ Erreur de connexion."; }
        }

        document.getElementById('btn-lang').onclick = () => { currentLang = currentLang === 'fr' ? 'en' : 'fr'; updateUI(); };

        document.getElementById('file-input').onchange = (e) => {
            Papa.parse(e.target.files[0], {
                header: true, skipEmptyLines: true,
                complete: (r) => {
                    tableData = r.data;
                    guidCol = r.meta.fields.find(h => h.toUpperCase().includes("GUID"));
                    const menu = document.getElementById('prop-selector');
                    menu.innerHTML = `<option value="">${t('selectParam')}</option>` + r.meta.fields.filter(h => h !== guidCol).map(h => `<option value="${h}">${h}</option>`).join('');
                    document.getElementById('ui-filter').style.display = "block";
                    document.getElementById('upload-zone').style.display = "none";
                    document.getElementById('status').innerText = t('statusLoaded', tableData.length);
                    cachedRuntimeIds = {}; // Reset cache on new file
                }
            });
        };

        // FONCTION DE RENDU HAUTE PERFORMANCE
        async function setVisibilityBatch(guids, isVisible, color = null) {
            if (!API) return;
            const models = await API.viewer.getModels();
            const selectorData = [];

            for (const m of models) {
                const mId = m.id || m.modelId;
                // On essaie de récupérer du cache pour éviter de harceler l'API
                const cacheKey = `${mId}-${guids.length}`;
                let rIds = cachedRuntimeIds[cacheKey];
                
                if (!rIds) {
                    rIds = await API.viewer.convertToObjectRuntimeIds(mId, guids);
                    cachedRuntimeIds[cacheKey] = rIds;
                }

                if (rIds && rIds.length > 0) {
                    selectorData.push({ modelId: mId, objectRuntimeIds: rIds });
                }
            }

            if (selectorData.length > 0) {
                const state = { visible: isVisible };
                if (color) state.color = color;
                // ON ENVOIE TOUT EN UN SEUL PAQUET (BATCH)
                await API.viewer.setObjectState({ modelObjectIds: selectorData }, state);
            }
        }

        document.getElementById('prop-selector').onchange = (e) => {
            const col = e.target.value;
            const res = document.getElementById('results');
            if (!col) { res.innerHTML = ""; return; }
            document.getElementById('btn-reset').style.display = "block";
            
            const groups = {};
            tableData.forEach(row => {
                const val = row[col] || t('notDefined');
                if (!groups[val]) groups[val] = [];
                if (row[guidCol]) groups[val].push(row[guidCol]);
            });

            res.innerHTML = "";
            Object.keys(groups).sort().forEach(val => {
                const div = document.createElement('div');
                div.className = "row";
                div.innerHTML = `<input type="checkbox" class="vis-check" checked> <input type="color" class="color-picker" value="#95a5a6"> <span>${val}</span><span class="count">(${groups[val].length})</span>`;
                
                const cb = div.querySelector('.vis-check');
                const cp = div.querySelector('.color-picker');

                cb.onchange = () => setVisibilityBatch(groups[val], cb.checked);
                
                cp.oninput = (ev) => {
                    const r = parseInt(ev.target.value.slice(1,3), 16), 
                          g = parseInt(ev.target.value.slice(3,5), 16), 
                          b = parseInt(ev.target.value.slice(5,7), 16);
                    setVisibilityBatch(groups[val], true, { r, g, b, a: 255 });
                    cb.checked = true;
                };
                res.appendChild(div);
            });
        };

        document.getElementById('btn-reset').onclick = async () => {
            if (!API) return;
            // Commande de reset ultra-rapide
            await API.viewer.resetColors();
            const models = await API.viewer.getModels();
            const batchReset = models.map(m => ({ modelId: m.id || m.modelId, all: true }));
            await API.viewer.setObjectState({ modelObjectIds: batchReset }, { visible: true });
            
            document.querySelectorAll('.vis-check').forEach(c => c.checked = true);
            document.querySelectorAll('.color-picker').forEach(cp => cp.value = "#95a5a6");
        };

        init();
    </script>
</body>
</html>
