<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer-when-downgrade">
    <script src="https://connect-extensions.trimble.com/js/trimble.connect.workspace.api.js"></script>
</head>
<body style="background: white; padding: 20px;">

    <h2 id="titre">🔄 Phase de test</h2>
    <p id="info">Si vous lisez ceci, le fichier est chargé.</p>
    <button id="btn-test" style="display:none; padding: 10px; background: green; color: white;">Scanner la sélection</button>

    <script>
        async function connect() {
            const info = document.getElementById('info');
            try {
                // On vérifie si Trimble répond
                const api = await TrimbleConnectWorkspace.connect();
                info.innerText = "✅ BRAVO ! La connexion fonctionne.";
                document.getElementById('btn-test').style.display = "block";
                
                document.getElementById('btn-test').onclick = async () => {
                    const sel = await api.ui.getSelection();
                    alert("Objets sélectionnés : " + sel.length);
                };
            } catch (e) {
                info.innerText = "Attente de Trimble... (Vérifiez les cookies tiers)";
            }
        }
        window.onload = connect;
    </script>
</body>
</html>
