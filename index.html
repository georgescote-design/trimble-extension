<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cartographie API</title>
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; font-size: 12px; }
        .card { border: 2px solid #333; padding: 15px; border-radius: 8px; background: #fff; }
        #log-box { background: #1e1e1e; color: #d4d4d4; padding: 10px; height: 400px; overflow-y: auto; font-family: monospace; margin-top: 10px; border-radius: 4px; white-space: pre-wrap; word-wrap: break-word;}
        .highlight { color: #569cd6; font-weight: bold; }
        .func { color: #dcdcaa; }
    </style>
</head>
<body>
    <div class="card">
        <h3 style="margin-top:0;">🔍 Cartographie Totale de l'API</h3>
        <div id="status">⏳ Connexion...</div>
        <div id="log-box">Recherche des modules en cours...</div>
    </div>

    <script>
        async function init() {
            const logBox = document.getElementById('log-box');
            try {
                const API = await TrimbleConnectWorkspace.connect(window.parent);
                document.getElementById('status').innerText = "✅ Connecté.";
                
                let output = "=== MODULES PRINCIPAUX ===\n";
                const modules = Object.keys(API);
                output += modules.join(", ") + "\n\n";

                output += "=== DÉTAIL DES COMMANDES ===\n";
                for (const mod of modules) {
                    if (typeof API[mod] === 'object' && API[mod] !== null) {
                        const funcs = Object.keys(API[mod]).filter(k => typeof API[mod][k] === 'function');
                        if (funcs.length > 0) {
                            output += `<span class="highlight">API.${mod}</span> dispose de ${funcs.length} commandes :\n`;
                            output += `<span class="func">${funcs.join("\n ")}</span>\n\n`;
                        } else {
                            output += `<span class="highlight">API.${mod}</span> : (Aucune fonction directe)\n\n`;
                        }
                    }
                }

                logBox.innerHTML = output;

            } catch (e) { 
                document.getElementById('status').innerText = "❌ Erreur de connexion.";
                logBox.innerText = e.message;
            }
        }

        init();
    </script>
</body>
</html>
