<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mon Filtre Trimble</title>
    <script src="https://connect-extensions.trimble.com/js/trimble.connect.workspace.api.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 15px; background: #f4f4f4; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 10px; margin-top: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #0078d4; color: white; font-weight: bold; cursor: pointer; border: none; }
        button:hover { background: #005a9e; }
        .layer-item { display: flex; align-items: center; background: white; margin-top: 5px; padding: 8px; border-radius: 4px; font-size: 13px; }
        .count { margin-left: auto; color: #888; font-size: 11px; }
    </style>
</head>
<body>
    <div class="card">
        <strong>Nom de la propriété à filtrer :</strong>
        <input type="text" id="propName" placeholder="ex: Phase, Statut, Lot...">
        <button id="btn-run">Générer les Calques</button>
    </div>
    <div id="status" style="font-size: 12px; color: #666; margin-top: 10px;"></div>
    <div id="layers-container"></div>

    <script>
        let api;

        async function init() {
            api = await TrimbleConnectWorkspace.connect();
        }

        document.getElementById('btn-run').onclick = async () => {
            const targetProp = document.getElementById('propName').value;
            const status = document.getElementById('status');
            const container = document.getElementById('layers-container');
            
            if(!targetProp) return alert("Entrez un nom de propriété");
            
            status.innerText = "Analyse du modèle en cours...";
            container.innerHTML = "";

            const allIds = await api.ui.getObjects();
            const allProps = await api.project.getProperties(allIds);
            
            const groups = {};

            allProps.forEach(obj => {
                let foundVal = "Non défini";
                // Cherche dans les propriétés de base ET les Property Sets personnalisés
                if (obj.properties && obj.properties[targetProp]) {
                    foundVal = obj.properties[targetProp];
                } else if (obj.propertySets) {
                    obj.propertySets.forEach(pset => {
                        if (pset.properties && pset.properties[targetProp]) {
                            foundVal = pset.properties[targetProp];
                        }
                    });
                }

                if (!groups[foundVal]) groups[foundVal] = [];
                groups[foundVal].push(obj.id);
            });

            status.innerText = Object.keys(groups).length + " groupes trouvés.";

            Object.keys(groups).forEach(val => {
                const item = document.createElement('div');
                item.className = 'layer-item';
                item.innerHTML = `<input type="checkbox" checked> <span>${val}</span> <span class="count">${groups[val].length} élém.</span>`;
                
                item.querySelector('input').onchange = (e) => {
                    api.visual.setObjectVisibility(groups[val], e.target.checked);
                };
                container.appendChild(item);
            });
        };

        init();
    </script>
</body>
</html>
