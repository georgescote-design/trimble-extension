<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://connect-extensions.trimble.com/js/trimble.connect.workspace.api.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f4f4f4; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #btn-scan { width: 100%; padding: 12px; background: #ccc; color: white; border: none; border-radius: 4px; cursor: not-allowed; font-weight: bold; }
        .ready { background: #0078d4 !important; cursor: pointer !important; }
        select { width: 100%; padding: 10px; margin-top: 10px; }
        .layer-item { display: flex; align-items: center; background: white; margin-top: 5px; padding: 8px; border-radius: 4px; border-left: 5px solid #0078d4; font-size: 13px; }
        .count { margin-left: auto; color: #888; font-size: 0.8em; }
    </style>
</head>
<body>

    <div class="card">
        <strong>Filtre de Propriétés</strong>
        <button id="btn-scan">Attente de Trimble...</button>
        
        <div id="ui-choix" style="display:none; margin-top:15px; border-top: 1px solid #eee; padding-top:10px;">
            <strong>Paramètre :</strong>
            <select id="prop-selector"></select>
        </div>
    </div>

    <div id="status" style="font-size: 11px; margin: 10px 0; color: #d40000;">Vérification de l'API...</div>
    <div id="layers-list"></div>

    <script>
        let api = null;
        let selectionProps = [];
        const btn = document.getElementById('btn-scan');
        const status = document.getElementById('status');

        // Fonction pour essayer de se connecter
        async function connectWithRetry() {
            try {
                // On vérifie si la bibliothèque est bien chargée dans la page
                if (typeof TrimbleConnectWorkspace === 'undefined') {
                    status.innerText = "Erreur : La bibliothèque Trimble n'est pas chargée. Vérifiez votre connexion internet.";
                    return;
                }

                api = await TrimbleConnectWorkspace.connect();
                
                if (api && api.ui) {
                    btn.innerText = "Scanner la sélection";
                    btn.className = "ready";
                    btn.disabled = false;
                    status.innerText = "Connecté avec succès !";
                    status.style.color = "green";
                } else {
                    throw new Error("API connectée mais module 'ui' absent.");
                }
            } catch (e) {
                status.innerText = "Tentative de reconnexion... " + e.message;
                setTimeout(connectWithRetry, 2000); // Réessaie toutes les 2 secondes
            }
        }

        btn.onclick = async () => {
            if (!api || !api.ui) return;
            
            status.innerText = "Lecture des objets sélectionnés...";
            status.style.color = "#666";
            
            try {
                const selIds = await api.ui.getSelection();
                
                if (!selIds || selIds.length === 0) {
                    status.innerText = "⚠️ Sélectionnez au moins un objet dans la maquette 3D.";
                    status.style.color = "orange";
                    return;
                }

                selectionProps = await api.project.getProperties(selIds);
                const uniqueNames = new Set();

                selectionProps.forEach(obj => {
                    if (obj.properties) Object.keys(obj.properties).forEach(n => uniqueNames.add(n));
                    if (obj.propertySets) {
                        obj.propertySets.forEach(ps => {
                            if (ps.properties) Object.keys(ps.properties).forEach(n => uniqueNames.add(n));
                        });
                    }
                });

                const selector = document.getElementById('prop-selector');
                selector.innerHTML = '<option value="">-- Choisir un paramètre --</option>';
                Array.from(uniqueNames).sort().forEach(n => {
                    const opt = document.createElement('option');
                    opt.value = n; opt.innerText = n;
                    selector.appendChild(opt);
                });

                document.getElementById('ui-choix').style.display = "block";
                status.innerText = selIds.length + " objets prêts.";
            } catch (e) {
                status.innerText = "Erreur lors du scan : " + e.message;
            }
        };

        document.getElementById('prop-selector').onchange = (e) => {
            const prop = e.target.value;
            const container = document.getElementById('layers-list');
            container.innerHTML = "";
            if (!prop || !api.visual) return;

            const groups = {};
            selectionProps.forEach(obj => {
                let val = "Non défini";
                if (obj.properties && obj.properties[prop]) val = obj.properties[prop];
                else if (obj.propertySets) {
                    obj.propertySets.forEach(ps => { if(ps.properties && ps.properties[prop]) val = ps.properties[prop]; });
                }
                if (!groups[val]) groups[val] = [];
                groups[val].push(obj.id);
            });

            Object.keys(groups).sort().forEach(v => {
                const item = document.createElement('div');
                item.className = 'layer-item';
                item.innerHTML = `<input type="checkbox" checked> <span style="margin-left:8px">${v}</span> <span class="count">${groups[v].length}</span>`;
                item.querySelector('input').onchange = (ev) => api.visual.setObjectVisibility(groups[v], ev.target.checked);
                container.appendChild(item);
            });
        };

        connectWithRetry();
    </script>
</body>
</html>
